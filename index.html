<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<title>GRAMAP - Instagrammable Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<style>
  :root{
    --bg:#000; --panel:#0e0e0e; --panel2:#1a1a1a;
    --text:#f5f5f5; --muted:#8a8a8a; --accent:#ffffff; --border:#222;
    --pin:#ffffff; --pinFav:#ff5a8c;
    --hdr:56px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--text);
    font-family:-apple-system,"Inter","Helvetica Neue","Hiragino Kaku Gothic ProN","Noto Sans JP",Arial,sans-serif;}

  /* ===== ヘッダー / ロゴ ===== */
  header{
    position:fixed;top:0;left:0;right:0;height:var(--hdr);z-index:1600;
    background:#000;border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;padding:0 18px;
  }
  .logo{
    font-family:"Inter","Helvetica Neue",Arial,sans-serif;
    font-weight:800;font-size:22px;letter-spacing:.22em;color:#fff;
    text-transform:uppercase;user-select:none;
  }
  .iconBtn{
    background:transparent;border:1px solid var(--border);color:#fff;
    width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:18px;
    display:none;align-items:center;justify-content:center;
  }

  /* ===== レイアウト ===== */
  #app{
    display:grid;grid-template-columns:380px 1fr;grid-template-rows:var(--hdr) 1fr;
    height:100vh;width:100vw;overflow:hidden;
  }
  #app > header{grid-column:1 / -1;grid-row:1;}
  #sidebar{
    grid-column:1;grid-row:2;background:var(--panel);border-right:1px solid var(--border);
    display:flex;flex-direction:column;overflow:hidden;min-height:0;
  }
  #map{
    grid-column:2;grid-row:2;background:#000;
    height:100%;width:100%;min-height:0;position:relative;z-index:1;
  }

  /* ===== 検索パネル ===== */
  #searchPanel{
    flex:0 0 auto;max-height:50%;overflow-y:auto;
    border-bottom:1px solid var(--border);
  }
  .search{padding:14px;display:flex;flex-direction:column;gap:10px;}
  .search input,.search select{
    width:100%;padding:9px 10px;background:var(--panel2);border:1px solid var(--border);
    border-radius:8px;color:var(--text);font-size:13px;outline:none;}
  .search .row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .lab{font-size:11px;color:var(--muted);margin-bottom:4px;letter-spacing:.05em;text-transform:uppercase;}
  .tagrow{display:flex;flex-wrap:wrap;gap:6px;}
  .tag{font-size:11px;padding:5px 9px;border:1px solid var(--border);border-radius:999px;
    background:var(--panel2);color:var(--muted);cursor:pointer;user-select:none;}
  .tag.active{background:#fff;color:#000;border-color:#fff;}
  .clearBtn{padding:8px;background:transparent;border:1px solid var(--border);
    border-radius:8px;color:var(--muted);cursor:pointer;font-size:12px;}

  /* ===== カードパネル ===== */
  #cardPanel{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--panel);min-height:0;}
  .sheetHandle{
    display:flex;align-items:center;justify-content:space-between;padding:10px 14px;
    border-bottom:1px solid var(--border);background:var(--panel);
  }
  .listHead{font-size:11px;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;}
  .expandToggle{display:none;background:transparent;border:none;color:#fff;
    cursor:pointer;font-size:18px;padding:4px 10px;}
  .list{flex:1;overflow-y:auto;padding:8px;}

  .card{background:var(--panel2);border:1px solid var(--border);border-radius:10px;
    margin-bottom:10px;overflow:hidden;cursor:pointer;transition:transform .15s,border-color .15s;}
  .card:hover{transform:translateY(-2px);border-color:#fff;}
  .thumbwrap{position:relative;}
  .thumb{width:100%;height:140px;background:#000 center/cover no-repeat;}
  .body{padding:10px 12px;}
  .ttl{display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .name{font-size:14px;font-weight:600;}
  .rate{font-size:12px;color:#fff;white-space:nowrap;}
  .area{font-size:11px;color:var(--muted);margin-top:2px;}
  .ctags{margin-top:6px;display:flex;flex-wrap:wrap;gap:4px;}
  .ctags span{font-size:10px;color:var(--muted);background:#222;padding:2px 6px;border-radius:999px;}
  .numBadge{
    position:absolute;top:8px;left:8px;background:#fff;color:#000;
    font-weight:800;font-size:12px;min-width:26px;height:26px;padding:0 6px;
    border-radius:13px;display:flex;align-items:center;justify-content:center;
    box-shadow:0 2px 4px rgba(0,0,0,.4);
  }
  .fav{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);
    border:none;color:#fff;font-size:14px;width:30px;height:30px;border-radius:50%;cursor:pointer;}
  .fav.on{color:var(--pinFav);}

  /* ===== マップピン（番号） ===== */
  .numPin{
    width:30px;height:30px;border-radius:50% 50% 50% 0;
    background:var(--pin);border:2px solid #000;
    transform:rotate(-45deg);box-shadow:0 2px 6px rgba(0,0,0,.6);
    display:flex;align-items:center;justify-content:center;
  }
  .numPin.fav{background:var(--pinFav);}
  .numPin > span{
    transform:rotate(45deg);color:#000;font-weight:800;font-size:12px;
    font-family:"Inter","Helvetica Neue",Arial,sans-serif;
  }
  .numPin.fav > span{color:#fff;}

  /* ===== 詳細オーバーレイ ===== */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;
    align-items:center;justify-content:center;z-index:2000;padding:16px;}
  .overlay.open{display:flex;}
  .detail{background:var(--panel);border:1px solid var(--border);border-radius:14px;
    max-width:680px;width:100%;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;position:relative;}
  .detail .close{position:absolute;top:12px;right:14px;background:rgba(0,0,0,.6);
    border:none;color:#fff;font-size:20px;cursor:pointer;width:34px;height:34px;border-radius:50%;z-index:2;}
  .images{display:flex;overflow-x:auto;gap:4px;scroll-snap-type:x mandatory;flex-shrink:0;}
  .images img{height:320px;flex-shrink:0;scroll-snap-align:start;background:#000;}
  .info{padding:18px 20px;overflow-y:auto;}
  .info h2{margin:0 0 6px;font-size:20px;}
  .meta{font-size:13px;color:var(--muted);margin-bottom:12px;}
  .row2{display:grid;grid-template-columns:90px 1fr;gap:6px 12px;font-size:13px;margin:10px 0;}
  .row2 dt{color:var(--muted);}
  .desc{font-size:14px;line-height:1.7;margin:10px 0;}
  .actions{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;}
  .btn{padding:10px 14px;border-radius:8px;border:1px solid #fff;
    background:#fff;color:#000;font-weight:600;text-decoration:none;font-size:13px;cursor:pointer;}
  .btn.ghost{background:transparent;color:#fff;}

  .leaflet-container{background:#000;}
  .backdrop{position:fixed;inset:var(--hdr) 0 0 0;background:rgba(0,0,0,.4);
    display:none;z-index:1450;}
  .backdrop.show{display:block;}

  /* ===== モバイル ===== */
  @media (max-width:768px){
    #app{grid-template-columns:1fr;}
    .iconBtn{display:flex;}
    #sidebar{display:contents;}

    #searchPanel{
      position:fixed;top:var(--hdr);left:0;right:0;
      max-height:75vh;background:var(--panel);border-bottom:1px solid var(--border);
      transform:translateY(-110%);transition:transform .25s ease;z-index:1500;
    }
    #searchPanel.open{transform:translateY(0);}

    #cardPanel{
      position:fixed;left:0;right:0;bottom:0;
      height:280px;z-index:1400;border-top:1px solid var(--border);
      transition:height .28s ease;border-radius:14px 14px 0 0;overflow:hidden;
    }
    #cardPanel.expanded{height:calc(100vh - var(--hdr));border-radius:0;}
    .expandToggle{display:block;}
    .sheetHandle{cursor:pointer;}

    #cardPanel:not(.expanded) .list{
      display:flex;flex-direction:row;gap:10px;
      overflow-x:auto;overflow-y:hidden;
      scroll-snap-type:x mandatory;
      padding:10px;
    }
    #cardPanel:not(.expanded) .card{
      flex:0 0 46%;margin:0;scroll-snap-align:start;
    }
    #cardPanel:not(.expanded) .thumb{height:90px;}
    #cardPanel:not(.expanded) .ctags{display:none;}

    #map{
      grid-column:1;grid-row:2;
      height:calc(100vh - var(--hdr));width:100vw;
    }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">GRAMAP</div>
    <button class="iconBtn" id="searchToggle" aria-label="検索">🔍</button>
  </header>

  <aside id="sidebar">
    <section id="searchPanel">
      <div class="search">
        <div>
          <div class="lab">Search</div>
          <input type="text" id="q" placeholder="名前・説明・タグから検索">
        </div>
        <div class="row">
          <div>
            <div class="lab">地方</div>
            <select id="region"><option value="">全地方</option></select>
          </div>
          <div>
            <div class="lab">都道府県</div>
            <select id="pref"><option value="">全都道府県</option></select>
          </div>
        </div>
        <div>
          <div class="lab">並び順</div>
          <select id="sort">
            <option value="rating">オススメ順</option>
            <option value="name">名前順</option>
            <option value="fav">お気に入りのみ</option>
          </select>
        </div>
        <div>
          <div class="lab">ハッシュタグ</div>
          <div class="tagrow" id="tags"></div>
        </div>
        <button class="clearBtn" id="clearBtn">条件をクリア</button>
      </div>
    </section>

    <section id="cardPanel">
      <div class="sheetHandle" id="sheetHandle">
        <div class="listHead" id="listHead">スポット一覧</div>
        <button class="expandToggle" id="expandToggle" aria-label="拡張">▲</button>
      </div>
      <div class="list" id="list"></div>
    </section>
  </aside>

  <div id="map"></div>
</div>

<div class="backdrop" id="backdrop"></div>
<div class="overlay" id="overlay"><div class="detail" id="detail"></div></div>

// ========= 共通 =========
function driveImg(id, w){ return "https://lh3.googleusercontent.com/d/" + id + "=w" + (w||1200); }

var map, markers=[], filtered=[];
var favs = JSON.parse(localStorage.getItem("favs") || "[]");
var state = { q:"", region:"", pref:"", sort:"rating", tags:[] };

// ========= Map =========
function initMap(){
  if (typeof L === 'undefined'){
    console.error('Leaflet (L) is not loaded.');
    return;
  }
  map = L.map('map', {
    zoomControl: false,
    attributionControl: true
  }).setView([35.68, 139.76], 11);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution:'© OpenStreetMap, © CARTO', maxZoom:19
  }).addTo(map);
  map.on('moveend', renderList);

  // レイアウト確定後にサイズ再計算
  setTimeout(function(){ map.invalidateSize(); }, 100);
  setTimeout(function(){ map.invalidateSize(); }, 500);
  window.addEventListener('load', function(){ map.invalidateSize(); });
  window.addEventListener('resize', function(){ map.invalidateSize(); });
}

function renderMarkers(){
  if (!map) return;
  for (var i=0;i<markers.length;i++) map.removeLayer(markers[i]);
  markers = [];
  for (var j=0;j<filtered.length;j++){
    (function(s, num){
      var isFav = favs.indexOf(s.id) >= 0;
      var icon = L.divIcon({
        className:'',
        html:'<div class="numPin' + (isFav?' fav':'') + '"><span>' + num + '</span></div>',
        iconSize:[30,38], iconAnchor:[15,38]
      });
      var mk = L.marker([s.lat, s.lng], { icon:icon }).addTo(map);
      mk.on('click', function(){ openDetail(s); });
      markers.push(mk);
    })(filtered[j], j+1);
  }
}

// ========= Filter =========
function applyFilters(){
  var q = state.q.toLowerCase();
  filtered = SPOTS.filter(function(s){
    if (state.region && s.region !== state.region) return false;
    if (state.pref && s.pref !== state.pref) return false;
    if (state.sort === "fav" && favs.indexOf(s.id) < 0) return false;
    for (var i=0;i<state.tags.length;i++){
      if (s.tags.indexOf(state.tags[i]) < 0) return false;
    }
    if (q){
      var hay = (s.name + " " + (s.description||"") + " " + s.tags.join(" ")).toLowerCase();
      if (hay.indexOf(q) < 0) return false;
    }
    return true;
  });
  if (state.sort === "name"){
    filtered.sort(function(a,b){ return a.name.localeCompare(b.name, 'ja'); });
  } else {
    filtered.sort(function(a,b){ return (b.rating||0) - (a.rating||0); });
  }
  renderMarkers();
  renderList();
}

// ========= List =========
function renderList(){
  if (!map) return;
  var bounds = map.getBounds();
  var visible = [];
  for (var i=0;i<filtered.length;i++){
    if (bounds.contains([filtered[i].lat, filtered[i].lng])){
      visible.push({ spot:filtered[i], num:i+1 });
    }
  }
  var listEl = document.getElementById('list');
  var headEl = document.getElementById('listHead');
  headEl.textContent = '表示範囲 ' + visible.length + ' / 全 ' + filtered.length + ' 件';

  if (!visible.length){
    listEl.innerHTML = '<div style="padding:24px;color:var(--muted);text-align:center;font-size:13px;">表示範囲に該当スポットがありません</div>';
    return;
  }
  var html = "";
  for (var v=0;v<visible.length;v++){
    var s = visible[v].spot;
    var num = visible[v].num;
    var img = s.images[0] ? driveImg(s.images[0], 600) : '';
    var isFav = favs.indexOf(s.id) >= 0;
    var tagHtml = "";
    var ts = s.tags.slice(0,4);
    for (var k=0;k<ts.length;k++) tagHtml += '<span>#' + ts[k] + '</span>';
    html += '<div class="card" data-id="' + s.id + '">' +
              '<div class="thumbwrap">' +
                '<div class="thumb" style="background-image:url(' + img + ')"></div>' +
                '<div class="numBadge">' + num + '</div>' +
                '<button class="fav ' + (isFav?'on':'') + '" data-fav="' + s.id + '">' + (isFav?'♥':'♡') + '</button>' +
              '</div>' +
              '<div class="body">' +
                '<div class="ttl"><div class="name">' + s.name + '</div><div class="rate">★ ' + (s.rating||'-') + '</div></div>' +
                '<div class="area">' + s.pref + ' / ' + s.area + '</div>' +
                '<div class="ctags">' + tagHtml + '</div>' +
              '</div>' +
            '</div>';
  }
  listEl.innerHTML = html;

  var cards = listEl.querySelectorAll('.card');
  for (var c=0;c<cards.length;c++){
    cards[c].addEventListener('click', function(e){
      if (e.target.getAttribute && e.target.getAttribute('data-fav')) return;
      var id = parseInt(this.getAttribute('data-id'), 10);
      var sp = null;
      for (var x=0;x<SPOTS.length;x++) if (SPOTS[x].id === id) { sp = SPOTS[x]; break; }
      if (sp){ map.flyTo([sp.lat, sp.lng], 16, { duration:.6 }); openDetail(sp); }
    });
  }
  var favBtns = listEl.querySelectorAll('[data-fav]');
  for (var f=0;f<favBtns.length;f++){
    favBtns[f].addEventListener('click', function(e){
      e.stopPropagation();
      var id = parseInt(this.getAttribute('data-fav'), 10);
      var idx = favs.indexOf(id);
      if (idx >= 0) favs.splice(idx,1); else favs.push(id);
      localStorage.setItem('favs', JSON.stringify(favs));
      applyFilters();
    });
  }
}

// ========= Detail =========
function openDetail(s){
  var imgs = "";
  for (var i=0;i<s.images.length;i++) imgs += '<img src="' + driveImg(s.images[i], 1200) + '" alt="">';
  var tagsHtml = "";
  for (var j=0;j<s.tags.length;j++) tagsHtml += '<span class="tag" style="cursor:default">#' + s.tags[j] + '</span> ';
  var isFav = favs.indexOf(s.id) >= 0;
  document.getElementById('detail').innerHTML =
    '<button class="close" id="closeBtn">×</button>' +
    '<div class="images">' + imgs + '</div>' +
    '<div class="info">' +
      '<h2>' + s.name + '</h2>' +
      '<div class="meta">' + s.pref + ' / ' + s.area + ' ・ ★ ' + (s.rating||'-') + '</div>' +
      '<div class="desc">' + (s.description||'') + '</div>' +
      '<dl class="row2">' +
        '<dt>営業時間</dt><dd>' + (s.hours||'-') + '</dd>' +
        '<dt>料金</dt><dd>' + (s.price||'-') + '</dd>' +
      '</dl>' +
      '<div style="display:flex;flex-wrap:wrap;gap:6px;margin:10px 0;">' + tagsHtml + '</div>' +
      '<div class="actions">' +
        '<a class="btn" href="' + s.mapUrl + '" target="_blank" rel="noopener">📍 Google Mapで開く</a>' +
        '<button class="btn ghost" id="favBtn">' + (isFav?'♥ 解除':'♡ お気に入り') + '</button>' +
      '</div>' +
    '</div>';
  document.getElementById('overlay').classList.add('open');
  document.getElementById('closeBtn').onclick = closeDetail;
  document.getElementById('favBtn').onclick = function(){
    var idx = favs.indexOf(s.id);
    if (idx >= 0) favs.splice(idx,1); else favs.push(s.id);
    localStorage.setItem('favs', JSON.stringify(favs));
    openDetail(s); applyFilters();
  };
}
function closeDetail(){ document.getElementById('overlay').classList.remove('open'); }
document.getElementById('overlay').addEventListener('click', function(e){
  if (e.target.id === 'overlay') closeDetail();
});

// ========= UI 初期化 =========
function initFilters(){
  var regions = {}, prefs = {}, tagSet = {};
  for (var i=0;i<SPOTS.length;i++){
    var s = SPOTS[i];
    regions[s.region] = 1; prefs[s.pref] = 1;
    for (var k=0;k<s.tags.length;k++) tagSet[s.tags[k]] = (tagSet[s.tags[k]]||0) + 1;
  }
  var regionEl = document.getElementById('region');
  var rk = Object.keys(regions);
  for (var r=0;r<rk.length;r++){
    var o = document.createElement('option'); o.value = rk[r]; o.textContent = rk[r]; regionEl.appendChild(o);
  }
  var prefEl = document.getElementById('pref');
  var pk = Object.keys(prefs);
  for (var p=0;p<pk.length;p++){
    var o2 = document.createElement('option'); o2.value = pk[p]; o2.textContent = pk[p]; prefEl.appendChild(o2);
  }
  var tagEl = document.getElementById('tags');
  var tk = Object.keys(tagSet).sort(function(a,b){ return tagSet[b]-tagSet[a]; });
  for (var t=0;t<tk.length;t++){
    (function(tag){
      var el = document.createElement('span');
      el.className = 'tag'; el.textContent = '#' + tag;
      el.addEventListener('click', function(){
        var idx = state.tags.indexOf(tag);
        if (idx >= 0){ state.tags.splice(idx,1); el.classList.remove('active'); }
        else { state.tags.push(tag); el.classList.add('active'); }
        applyFilters();
      });
      tagEl.appendChild(el);
    })(tk[t]);
  }
  document.getElementById('q').addEventListener('input', function(e){ state.q = e.target.value; applyFilters(); });
  regionEl.addEventListener('change', function(e){ state.region = e.target.value; applyFilters(); });
  prefEl.addEventListener('change', function(e){ state.pref = e.target.value; applyFilters(); });
  document.getElementById('sort').addEventListener('change', function(e){ state.sort = e.target.value; applyFilters(); });

  document.getElementById('clearBtn').addEventListener('click', function(){
    state = { q:"", region:"", pref:"", sort:"rating", tags:[] };
    document.getElementById('q').value = "";
    regionEl.value = ""; prefEl.value = "";
    document.getElementById('sort').value = "rating";
    var ts = document.querySelectorAll('#tags .tag');
    for (var i=0;i<ts.length;i++) ts[i].classList.remove('active');
    applyFilters();
  });
}

// ========= モバイルUI制御 =========
function initMobileUI(){
  var searchPanel = document.getElementById('searchPanel');
  var cardPanel = document.getElementById('cardPanel');
  var backdrop = document.getElementById('backdrop');
  var searchToggle = document.getElementById('searchToggle');
  var sheetHandle = document.getElementById('sheetHandle');
  var expandToggle = document.getElementById('expandToggle');

  searchToggle.addEventListener('click', function(){
    var open = searchPanel.classList.toggle('open');
    backdrop.classList.toggle('show', open);
  });
  backdrop.addEventListener('click', function(){
    searchPanel.classList.remove('open');
    backdrop.classList.remove('show');
  });

  function toggleSheet(){
    var expanded = cardPanel.classList.toggle('expanded');
    expandToggle.textContent = expanded ? '▼' : '▲';
    setTimeout(function(){ if (map) map.invalidateSize(); }, 300);
  }
  sheetHandle.addEventListener('click', toggleSheet);

  window.addEventListener('resize', function(){
    if (window.innerWidth > 768){
      searchPanel.classList.remove('open');
      cardPanel.classList.remove('expanded');
      backdrop.classList.remove('show');
      expandToggle.textContent = '▲';
    }
  });
}

// ========= 起動 =========
initMap();
initFilters();
initMobileUI();
applyFilters();
</script>
</body>
</html>
