<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SNS映えスポットMAP</title>

  <link
    href="https://unpkg.com/maplibre-gl@5.6.1/dist/maplibre-gl.css"
    rel="stylesheet"
  />
  <script src="https://unpkg.com/maplibre-gl@5.6.1/dist/maplibre-gl.js"></script>

  <style>
    :root {
      --bg: #0b0b0d;
      --panel: rgba(18, 18, 22, 0.92);
      --line: rgba(255,255,255,0.08);
      --text: #f5f5f7;
      --muted: #a8a8b3;
      --pink: #ff4da6;
      --gold: #d5b15b;
      --shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans JP", sans-serif;
      overflow: hidden;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .topbar {
      position: absolute;
      top: 14px;
      left: 14px;
      right: 14px;
      z-index: 20;
      display: grid;
      grid-template-columns: 180px 180px 180px 1fr 140px;
      gap: 10px;
      padding: 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
    }

    .control,
    .search,
    .button {
      height: 44px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      padding: 0 12px;
      outline: none;
      font-size: 14px;
    }

    .control option {
      color: #111;
    }

    .button {
      cursor: pointer;
      font-weight: 700;
    }

    .sidepanel {
      position: absolute;
      top: 92px;
      right: 14px;
      bottom: 14px;
      width: 380px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    #selectedPanel {
      display: none;
      min-height: 220px;
      max-height: 45%;
    }

    #selectedPanel.active {
      display: block;
    }

    #selectedBody {
      padding: 16px;
      overflow: auto;
    }

    #listPanel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 220px;
    }

    #listHead {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--line);
      font-weight: 700;
    }

    #listBody {
      padding: 10px;
      overflow: auto;
      display: grid;
      gap: 10px;
    }

    .card {
      display: grid;
      grid-template-columns: 108px 1fr;
      gap: 12px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,0.03);
      cursor: pointer;
    }

    .thumb {
      width: 100%;
      height: 108px;
      object-fit: cover;
      border-radius: 12px;
      background: #1b1b21;
      border: 1px solid var(--line);
    }

    .hero {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 16px;
      background: #1b1b21;
      border: 1px solid var(--line);
      margin-bottom: 12px;
    }

    .name {
      margin: 0;
      font-size: 16px;
      line-height: 1.4;
      font-weight: 700;
    }

    .small {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .desc {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      margin-top: 8px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .chip {
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--muted);
      background: rgba(255,255,255,0.03);
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .link-button,
    .fav-button,
    .close-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      text-decoration: none;
      cursor: pointer;
      font-weight: 700;
      background: rgba(255,255,255,0.05);
      color: var(--text);
    }

    .link-button {
      background: #fff;
      color: #111;
    }

    .rating {
      color: var(--gold);
      font-weight: 700;
    }

    .marker {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid #000;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.15);
      cursor: pointer;
    }

    .marker.active {
      background: var(--pink);
      box-shadow: 0 0 0 6px rgba(255,77,166,0.18);
    }

    .empty {
      padding: 18px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 980px) {
      .topbar {
        grid-template-columns: 1fr 1fr;
      }

      .sidepanel {
        left: 14px;
        right: 14px;
        width: auto;
        top: auto;
        height: 48%;
      }

      #selectedPanel {
        max-height: 55%;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="map"></div>

    <div class="topbar">
      <select id="regionFilter" class="control">
        <option value="">地方（すべて）</option>
      </select>

      <select id="prefFilter" class="control">
        <option value="">都道府県（すべて）</option>
      </select>

      <input id="tagFilter" class="search" type="text" placeholder="#夜景 #映え など" />
      <input id="freewordFilter" class="search" type="text" placeholder="スポット名 / 説明 / ハッシュタグで検索" />

      <button id="favoritesOnlyBtn" class="button">☆ お気に入り</button>
    </div>

    <div class="sidepanel">
      <div id="selectedPanel" class="panel">
        <div id="selectedBody"></div>
      </div>

      <div id="listPanel" class="panel">
        <div id="listHead">地図範囲内のおすすめ順</div>
        <div id="listBody"></div>
      </div>
    </div>
  </div>

  <script>
    const STATE = {
      spots: [],
      filteredSpots: [],
      visibleSpots: [],
      selectedSpotId: null,
      favoritesOnly: false,
      favorites: new Set(JSON.parse(localStorage.getItem("spotFavorites") || "[]")),
      map: null,
      markers: new Map()
    };

    const els = {
      regionFilter: document.getElementById("regionFilter"),
      prefFilter: document.getElementById("prefFilter"),
      tagFilter: document.getElementById("tagFilter"),
      freewordFilter: document.getElementById("freewordFilter"),
      favoritesOnlyBtn: document.getElementById("favoritesOnlyBtn"),
      selectedPanel: document.getElementById("selectedPanel"),
      selectedBody: document.getElementById("selectedBody"),
      listHead: document.getElementById("listHead"),
      listBody: document.getElementById("listBody")
    };

    function escapeHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function shorten(str, len) {
      const s = String(str || "");
      return s.length > len ? s.slice(0, len) + "…" : s;
    }

    function ratingStars(value) {
      const n = Math.max(0, Math.min(5, Number(value || 0)));
      return "★".repeat(n) + "☆".repeat(5 - n);
    }

    function saveFavorites() {
      localStorage.setItem("spotFavorites", JSON.stringify(Array.from(STATE.favorites)));
    }

    function toggleFavorite(id) {
      if (STATE.favorites.has(id)) {
        STATE.favorites.delete(id);
      } else {
        STATE.favorites.add(id);
      }
      saveFavorites();
      renderSelected();
      updateVisibleCards();
      updateMarkerStyles();
    }

    function getDriveFileId(url) {
      if (!url) return null;
      const m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
      return m ? m[1] : null;
    }

    function toImageUrl(url) {
      if (!url) return "";
      if (url.indexOf("drive.google.com") !== -1) {
        const id = getDriveFileId(url);
        if (!id) return url;
        return "https://drive.google.com/thumbnail?id=" + id + "&sz=w1600";
      }
      return url;
    }

    function parseTags(input) {
      return String(input || "")
        .split(/\s+/)
        .map(function(v) { return v.trim(); })
        .filter(function(v) { return v.length > 0; })
        .map(function(v) {
          return v.startsWith("#") ? v : "#" + v;
        });
    }

    function normalizeText(s) {
      return String(s || "").toLowerCase();
    }

    function getSearchText(spot) {
      const parts = [
        spot.name,
        spot.description,
        spot.prefecture,
        spot.region,
        spot.hours,
        spot.fee
      ].concat(spot.hashtags || []);
      return normalizeText(parts.join(" "));
    }

    function buildFilterOptions() {
      const regions = Array.from(new Set(
        STATE.spots.map(function(s) { return s.region; }).filter(Boolean)
      )).sort();

      const prefs = Array.from(new Set(
        STATE.spots.map(function(s) { return s.prefecture; }).filter(Boolean)
      )).sort();

      els.regionFilter.innerHTML =
        '<option value="">地方（すべて）</option>' +
        regions.map(function(v) {
          return '<option value="' + escapeHtml(v) + '">' + escapeHtml(v) + '</option>';
        }).join("");

      els.prefFilter.innerHTML =
        '<option value="">都道府県（すべて）</option>' +
        prefs.map(function(v) {
          return '<option value="' + escapeHtml(v) + '">' + escapeHtml(v) + '</option>';
        }).join("");
    }

    function currentFilters() {
      return {
        region: els.regionFilter.value,
        pref: els.prefFilter.value,
        tags: parseTags(els.tagFilter.value),
        freeword: normalizeText(els.freewordFilter.value.trim()),
        favoritesOnly: STATE.favoritesOnly
      };
    }

    function applyFilters() {
      const filters = currentFilters();

      STATE.filteredSpots = STATE.spots.filter(function(spot) {
        if (filters.region && spot.region !== filters.region) return false;
        if (filters.pref && spot.prefecture !== filters.pref) return false;
        if (filters.favoritesOnly && !STATE.favorites.has(spot.id)) return false;

        if (filters.tags.length > 0) {
          const tags = spot.hashtags || [];
          const ok = filters.tags.every(function(t) {
            return tags.indexOf(t) !== -1;
          });
          if (!ok) return false;
        }

        if (filters.freeword) {
          const text = getSearchText(spot);
          if (text.indexOf(filters.freeword) === -1) return false;
        }

        return true;
      });

      updateMarkerVisibility();
      fitToFiltered();
      updateVisibleCards();
    }

    function fitToFiltered() {
      if (!STATE.map || STATE.filteredSpots.length === 0) return;

      if (STATE.filteredSpots.length === 1) {
        const s = STATE.filteredSpots[0];
        STATE.map.flyTo({
          center: [s.lng, s.lat],
          zoom: 14,
          essential: true
        });
        return;
      }

      const bounds = new maplibregl.LngLatBounds();
      STATE.filteredSpots.forEach(function(s) {
        bounds.extend([s.lng, s.lat]);
      });

      STATE.map.fitBounds(bounds, {
        padding: 80,
        maxZoom: 14,
        duration: 700
      });
    }

    function createMarker(spot) {
      const el = document.createElement("div");
      el.className = "marker";
      el.title = spot.name;

      el.addEventListener("click", function(e) {
        e.stopPropagation();
        selectSpot(spot.id, false);
      });

      const marker = new maplibregl.Marker({
        element: el,
        anchor: "center"
      })
        .setLngLat([spot.lng, spot.lat])
        .addTo(STATE.map);

      STATE.markers.set(spot.id, marker);
    }

    function updateMarkerVisibility() {
      const visibleIds = new Set(
        STATE.filteredSpots.map(function(s) { return s.id; })
      );

      STATE.markers.forEach(function(marker, id) {
        const el = marker.getElement();
        el.style.display = visibleIds.has(id) ? "block" : "none";
      });

      updateMarkerStyles();
    }

    function updateMarkerStyles() {
      STATE.markers.forEach(function(marker, id) {
        marker.getElement().classList.toggle("active", STATE.selectedSpotId === id);
      });
    }

    function getVisibleSpotsInViewport() {
      const bounds = STATE.map.getBounds();
      return STATE.filteredSpots
        .filter(function(s) {
          return bounds.contains([s.lng, s.lat]);
        })
        .sort(function(a, b) {
          return (b.recommendation || 0) - (a.recommendation || 0);
        });
    }

    function selectSpot(id, fly) {
      STATE.selectedSpotId = id;
      updateMarkerStyles();
      renderSelected();
      updateVisibleCards();

      const spot = STATE.spots.find(function(s) { return s.id === id; });
      if (spot && fly) {
        STATE.map.flyTo({
          center: [spot.lng, spot.lat],
          zoom: Math.max(14, STATE.map.getZoom()),
          essential: true
        });
      }
    }

    function clearSelection() {
      STATE.selectedSpotId = null;
      updateMarkerStyles();
      renderSelected();
      updateVisibleCards();
    }

    function renderSelected() {
      const spot = STATE.spots.find(function(s) {
        return s.id === STATE.selectedSpotId;
      });

      if (!spot) {
        els.selectedPanel.classList.remove("active");
        els.selectedBody.innerHTML = "";
        return;
      }

      const hero = toImageUrl((spot.images && spot.images[0]) || "");
      const isFav = STATE.favorites.has(spot.id);

      let html = "";

      if (hero) {
        html += '<img class="hero" src="' + hero + '" alt="' + escapeHtml(spot.name) + '">';
      }

      html += '<div class="small">' +
        escapeHtml(spot.region || "") + ' / ' + escapeHtml(spot.prefecture || "") +
        '</div>';

      html += '<h2 class="name" style="font-size:20px;margin-top:4px;">' +
        escapeHtml(spot.name) +
        '</h2>';

      html += '<div class="small" style="margin-top:8px;"><span class="rating">' +
        ratingStars(spot.recommendation) +
        '</span> おすすめ度 ' + (spot.recommendation || 0) + '/5</div>';

      if (spot.hours) {
        html += '<div class="small">営業時間：' + escapeHtml(spot.hours) + '</div>';
      }

      if (spot.fee) {
        html += '<div class="small">料金：' + escapeHtml(spot.fee) + '</div>';
      }

      if (spot.description) {
        html += '<div class="desc">' + escapeHtml(spot.description) + '</div>';
      }

      html += '<div class="chips">';
      (spot.hashtags || []).forEach(function(tag) {
        html += '<span class="chip">' + escapeHtml(tag) + '</span>';
      });
      html += '</div>';

      html += '<div class="actions">';
      html += '<a class="link-button" href="' + spot.googleMapsUrl + '" target="_blank" rel="noopener noreferrer">Google Mapで開く</a>';
      html += '<button class="fav-button" id="favSelectedBtn">' + (isFav ? "★ お気に入り済み" : "☆ お気に入り") + '</button>';
      html += '<button class="close-button" id="closeSelectedBtn">閉じる</button>';
      html += '</div>';

      els.selectedBody.innerHTML = html;
      els.selectedPanel.classList.add("active");

      document.getElementById("favSelectedBtn").onclick = function() {
        toggleFavorite(spot.id);
      };

      document.getElementById("closeSelectedBtn").onclick = function() {
        clearSelection();
      };
    }

    function updateVisibleCards() {
      if (!STATE.map) return;

      STATE.visibleSpots = getVisibleSpotsInViewport();

      els.listHead.textContent = STATE.selectedSpotId
        ? "地図範囲内のスポット"
        : "地図範囲内のおすすめ順";

      if (STATE.visibleSpots.length === 0) {
        els.listBody.innerHTML = '<div class="empty">条件に合うスポットがありません。</div>';
        return;
      }

      let html = "";

      STATE.visibleSpots.forEach(function(spot) {
        const img = toImageUrl((spot.images && spot.images[0]) || "");
        const isFav = STATE.favorites.has(spot.id);

        html += '<div class="card" data-id="' + spot.id + '">';

        if (img) {
          html += '<img class="thumb" src="' + img + '" alt="' + escapeHtml(spot.name) + '">';
        } else {
          html += '<div class="thumb"></div>';
        }

        html += '<div>';
        html += '<div class="small">' + escapeHtml(spot.prefecture || "") + ' / ' + escapeHtml(spot.region || "") + '</div>';
        html += '<h3 class="name">' + escapeHtml(spot.name) + '</h3>';
        html += '<div class="small"><span class="rating">' + ratingStars(spot.recommendation) + '</span> ' + (spot.recommendation || 0) + '/5 ' + (isFav ? '★' : '') + '</div>';

        if (spot.description) {
          html += '<div class="desc">' + escapeHtml(shorten(spot.description, 56)) + '</div>';
        }

        html += '<div class="chips">';
        (spot.hashtags || []).slice(0, 4).forEach(function(tag) {
          html += '<span class="chip">' + escapeHtml(tag) + '</span>';
        });
        html += '</div>';

        html += '</div>';
        html += '</div>';
      });

      els.listBody.innerHTML = html;

      Array.from(els.listBody.querySelectorAll(".card")).forEach(function(card) {
        card.onclick = function() {
          selectSpot(card.dataset.id, true);
        };
      });
    }

    function setupMap() {
      STATE.map = new maplibregl.Map({
        container: "map",
        style: "https://demotiles.maplibre.org/style.json",
        center: [139.76, 35.67],
        zoom: 10.7,
        attributionControl: true
      });

      STATE.map.addControl(new maplibregl.NavigationControl(), "bottom-left");

      STATE.map.on("load", function() {
        STATE.spots.forEach(createMarker);
        applyFilters();
      });

      STATE.map.on("moveend", function() {
        updateVisibleCards();
      });

      STATE.map.on("click", function() {
        clearSelection();
      });
    }

    function setupEvents() {
      els.regionFilter.addEventListener("change", applyFilters);
      els.prefFilter.addEventListener("change", applyFilters);

      let t1 = null;
      let t2 = null;

      els.tagFilter.addEventListener("input", function() {
        clearTimeout(t1);
        t1 = setTimeout(applyFilters, 250);
      });

      els.freewordFilter.addEventListener("input", function() {
        clearTimeout(t2);
        t2 = setTimeout(applyFilters, 250);
      });

      els.favoritesOnlyBtn.addEventListener("click", function() {
        STATE.favoritesOnly = !STATE.favoritesOnly;
        els.favoritesOnlyBtn.textContent = STATE.favoritesOnly ? "★ お気に入りのみ" : "☆ お気に入り";
        applyFilters();
      });
    }

    function loadSpots() {
      fetch("./spots.json")
        .then(function(res) { return res.json(); })
        .then(function(data) {
          STATE.spots = data;
          buildFilterOptions();
          setupMap();
        })
        .catch(function(err) {
          console.error(err);
          document.getElementById("app").innerHTML =
            '<div style="padding:24px;color:white;">spots.json の読み込みに失敗しました。</div>';
        });
    }

    setupEvents();
    loadSpots();
  </script>
</body>
</html>
