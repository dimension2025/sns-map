<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<title>GRAMAP</title>
<style>
  :root{
    --bg:#000; --panel:#0e0e0e; --panel2:#1a1a1a;
    --text:#f5f5f5; --muted:#7a7a7a; --accent:#ffffff; --border:#222;
    --pin:#ffffff; --pinFav:#ff5a8c; --pinMe:#3da9ff;
    --hdr:56px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--text);
    font-family:-apple-system,"Inter","Helvetica Neue","Hiragino Kaku Gothic ProN","Noto Sans JP",Arial,sans-serif;}
  header{
    position:fixed;top:0;left:0;right:0;height:var(--hdr);z-index:1600;
    background:#000;border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;padding:0 18px;
  }
  .brand{display:flex;align-items:baseline;gap:14px;}
  .logo{
    font-family:"Inter","Helvetica Neue",Arial,sans-serif;
    font-weight:300;font-size:22px;letter-spacing:.18em;color:#fff;
    text-transform:uppercase;user-select:none;
  }
  .subtitle{font-size:11px;color:var(--muted);letter-spacing:.05em;font-weight:400;}
  .iconBtn{
    background:transparent;border:1px solid var(--border);color:#fff;
    width:40px;height:40px;border-radius:50%;cursor:pointer;
    display:none;align-items:center;justify-content:center;
    font-weight:700;font-size:18px;
  }
  #app{
    display:grid;grid-template-columns:380px 1fr;grid-template-rows:var(--hdr) 1fr;
    height:100vh;width:100vw;overflow:hidden;
  }
  #app > header{grid-column:1 / -1;grid-row:1;}
  #sidebar{
    grid-column:1;grid-row:2;background:var(--panel);border-right:1px solid var(--border);
    display:flex;flex-direction:column;overflow:hidden;min-height:0;
  }
  #map{
    grid-column:2;grid-row:2;background:#000;
    height:100%;width:100%;min-height:0;position:relative;z-index:1;
  }
  #searchPanel{flex:0 0 auto;border-bottom:1px solid var(--border);}
  .search{padding:14px;display:flex;flex-direction:column;gap:12px;}
  .lab{font-size:11px;color:var(--muted);margin-bottom:6px;letter-spacing:.05em;text-transform:uppercase;}
  .tagrow{display:flex;flex-wrap:wrap;gap:6px;max-height:120px;overflow-y:auto;}
  .tag{font-size:11px;padding:5px 9px;border:1px solid var(--border);border-radius:999px;
    background:var(--panel2);color:var(--muted);cursor:pointer;user-select:none;}
  .tag.active{background:#fff;color:#000;border-color:#fff;}
  .favToggle{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 12px;background:var(--panel2);border:1px solid var(--border);
    border-radius:8px;cursor:pointer;font-size:13px;user-select:none;
  }
  .favToggle .sw{width:36px;height:20px;background:#333;border-radius:10px;position:relative;transition:background .2s;}
  .favToggle .sw::after{
    content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;
    background:#fff;border-radius:50%;transition:transform .2s;
  }
  .favToggle.on .sw{background:var(--pinFav);}
  .favToggle.on .sw::after{transform:translateX(16px);}
  .clearBtn{padding:8px;background:transparent;border:1px solid var(--border);
    border-radius:8px;color:var(--muted);cursor:pointer;font-size:12px;}
  #cardPanel{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--panel);min-height:0;}
  .sheetHandle{
    display:flex;align-items:center;justify-content:space-between;padding:10px 14px;
    border-bottom:1px solid var(--border);background:var(--panel);flex:0 0 auto;
  }
  .listHead{font-size:11px;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;}
  .expandToggle{display:none;background:transparent;border:none;color:#fff;cursor:pointer;font-size:18px;padding:4px 10px;}
  .list{
    flex:1;overflow-y:auto;padding:8px;
    display:grid;grid-template-columns:1fr 1fr;gap:8px;align-content:start;
  }
  .card{background:var(--panel2);border:1px solid var(--border);border-radius:10px;
    overflow:hidden;cursor:pointer;transition:transform .15s,border-color .15s;}
  .card:hover{transform:translateY(-2px);border-color:#fff;}
  .thumbwrap{position:relative;width:100%;aspect-ratio:1/1;}
  .thumb{position:absolute;inset:0;background:#000 center/cover no-repeat;}
  .body{padding:8px 10px;}
  .ttl{display:flex;justify-content:space-between;align-items:center;gap:6px;}
  .name{font-size:12px;font-weight:600;line-height:1.3;
    overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
  .rate{font-size:11px;color:#fff;white-space:nowrap;}
  .area{font-size:10px;color:var(--muted);margin-top:2px;}
  .numBadge{
    position:absolute;top:6px;left:6px;background:#fff;color:#000;
    font-weight:800;font-size:11px;min-width:22px;height:22px;padding:0 5px;
    border-radius:11px;display:flex;align-items:center;justify-content:center;
    box-shadow:0 2px 4px rgba(0,0,0,.4);z-index:2;
  }
  .fav{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.6);
    border:none;color:#fff;font-size:12px;width:26px;height:26px;border-radius:50%;cursor:pointer;z-index:2;}
  .fav.on{color:var(--pinFav);}
  .numPin{
    width:30px;height:30px;border-radius:50% 50% 50% 0;
    background:var(--pin);border:2px solid #000;
    transform:rotate(-45deg);box-shadow:0 2px 6px rgba(0,0,0,.6);
    display:flex;align-items:center;justify-content:center;
  }
  .numPin.fav{background:var(--pinFav);}
  .numPin.dim{opacity:.45;}
  .numPin > span{
    transform:rotate(45deg);color:#000;font-weight:800;font-size:12px;
    font-family:"Inter","Helvetica Neue",Arial,sans-serif;
  }
  .numPin.fav > span{color:#fff;}
  .mePin{
    width:18px;height:18px;border-radius:50%;
    background:var(--pinMe);border:3px solid #fff;
    box-shadow:0 0 0 4px rgba(61,169,255,.25);
  }
  #detailPanel{
    display:none;background:var(--panel);border-right:1px solid var(--border);
    flex-direction:column;overflow:hidden;min-height:0;
    grid-column:1;grid-row:2;position:relative;
  }
  body.detail-mode #sidebar{display:none;}
  body.detail-mode #detailPanel{display:flex;}
  .detailClose{
    position:absolute;top:12px;right:12px;background:rgba(0,0,0,.6);
    border:1px solid var(--border);color:#fff;font-size:18px;cursor:pointer;
    width:36px;height:36px;border-radius:50%;z-index:5;
  }
  .detailImages{
    flex:0 0 auto;display:flex;overflow-x:auto;scroll-snap-type:x mandatory;background:#000;
  }
  .detailImages img{
    width:100%;height:300px;object-fit:cover;flex:0 0 100%;scroll-snap-align:center;background:#000;
  }
  .detailImages.single img{flex:1;width:100%;}
  .detailBody{flex:1;overflow-y:auto;padding:20px;}
  .detailBody h2{margin:0 0 6px;font-size:20px;text-align:center;}
  .detailBody .meta{font-size:13px;color:var(--muted);margin-bottom:14px;text-align:center;}
  .detailBody .desc{font-size:14px;line-height:1.7;margin:12px 0;}
  .detailBody dl{display:grid;grid-template-columns:90px 1fr;gap:8px 12px;font-size:13px;margin:14px 0;}
  .detailBody dt{color:var(--muted);}
  .detailBody .tags{display:flex;flex-wrap:wrap;gap:6px;margin:14px 0;justify-content:center;}
  .detailBody .actions{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;justify-content:center;}
  .btn{padding:10px 18px;border-radius:8px;border:1px solid #fff;
    background:#fff;color:#000;font-weight:600;text-decoration:none;font-size:13px;cursor:pointer;}
  .btn.ghost{background:transparent;color:#fff;}
  .leaflet-container{background:#000;}
  .backdrop{position:fixed;inset:var(--hdr) 0 0 0;background:rgba(0,0,0,.4);display:none;z-index:1450;}
  .backdrop.show{display:block;}
  #loadingMsg{
    position:fixed;inset:0;background:#000;color:#fff;
    display:flex;align-items:center;justify-content:center;
    font-size:14px;z-index:9999;
  }
  @media (max-width:768px){
    #app{grid-template-columns:1fr;}
    .iconBtn{display:flex;}
    #sidebar{display:contents;}
    #searchPanel{
      position:fixed;top:var(--hdr);left:0;right:0;
      max-height:75vh;background:var(--panel);border-bottom:1px solid var(--border);
      transform:translateY(-110%);transition:transform .25s ease;z-index:1500;
    }
    #searchPanel.open{transform:translateY(0);}
    #cardPanel{
      position:fixed;left:0;right:0;bottom:0;
      height:240px;z-index:1400;border-top:1px solid var(--border);
      transition:height .28s ease, top .28s ease;
      border-radius:14px 14px 0 0;overflow:hidden;
    }
    #cardPanel.expanded{top:var(--hdr);height:auto;border-radius:0;}
    .expandToggle{display:block;}
    .sheetHandle{cursor:pointer;}
    #map{grid-column:1;grid-row:2;height:calc(100vh - var(--hdr));width:100vw;}
    body.detail-mode #detailPanel{
      position:fixed;left:0;right:0;bottom:0;
      height:60vh;z-index:1500;border-right:none;border-top:1px solid var(--border);
      border-radius:14px 14px 0 0;
      grid-column:auto;grid-row:auto;
    }
    body.detail-mode #map{height:calc(40vh - var(--hdr) + 14px);}
    body.detail-mode #cardPanel{display:none;}
    body.detail-mode .iconBtn{display:none;}
    .detailImages img{height:220px;}
  }
</style>
</head>
<body>
<div id="loadingMsg">Loading...</div>
<div id="app">

    <div class="brand">

  </header>
  <aside id="sidebar">
    <section id="searchPanel">
      <div class="search">
        <div>
          <div class="lab">ハッシュタグ</div>
          <div class="tagrow" id="tags"></div>
        </div>
        <div class="favToggle" id="favToggle">
          <span>♥ お気に入りのみ表示</span>
          <span class="sw"></span>
        </div>
        <button class="clearBtn" id="clearBtn">条件をクリア</button>
      </div>
    </section>
    <section id="cardPanel">
      <div class="sheetHandle" id="sheetHandle">
        <div class="listHead" id="listHead">スポット一覧</div>
        <button class="expandToggle" id="expandToggle" aria-label="拡張">▲</button>
      </div>
      <div class="list" id="list"></div>
    </section>
  </aside>
  <section id="detailPanel">
    <button class="detailClose" id="detailClose" aria-label="閉じる">×</button>
    <div class="detailImages" id="detailImages"></div>
    <div class="detailBody" id="detailBody"></div>
  </section>
  <div id="map"></div>
</div>
<div class="backdrop" id="backdrop"></div>

    link.rel = 'stylesheet'; link.href = c.css;
    document.head.appendChild(link);
    var s = document.createElement('script');
    s.src = c.js;
    s.onload = function(){

    };
    s.onerror = function(){ tryCdn(i+1); };

  var KANTO_BOUNDS_ARR = [[34.5, 138.5], [37.5, 141.2]];
  var KANTO_CENTER = [35.85, 139.85];

  function driveImg(id, w){ return "https://lh3.googleusercontent.com/d/" + id + "=w" + (w||1200); }

  var map, markers=[], filtered=[], meMarker=null;

  function initMap(){
    var kantoBounds = L.latLngBounds(KANTO_BOUNDS_ARR);
    map = L.map('map', {
      zoomControl:false, attributionControl:true,
      maxBounds: kantoBounds, maxBoundsViscosity:1.0,
      minZoom:8
    }).setView(KANTO_CENTER, 9);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution:'© OpenStreetMap, © CARTO', maxZoom:19, bounds: kantoBounds
    }).addTo(map);
    map.on('moveend', function(){ renderMarkers(); renderList(); });
    setTimeout(function(){ map.invalidateSize(); }, 100);
    setTimeout(function(){ map.invalidateSize(); }, 500);
    window.addEventListener('load', function(){ map.invalidateSize(); });
    window.addEventListener('resize', function(){ map.invalidateSize(); });
  }

  function initGeolocation(){
    if (!('geolocation' in navigator)) return;
    navigator.geolocation.getCurrentPosition(function(pos){
      try {
        var lat = pos.coords.latitude, lng = pos.coords.longitude;
        var b = KANTO_BOUNDS_ARR;
        var inKanto = (lat >= b[0][0] && lat <= b[1][0] && lng >= b[0][1] && lng <= b[1][1]);
        if (!inKanto || !map) return;
        var icon = L.divIcon({
          className:'', html:'<div class="mePin"></div>',
          iconSize:[18,18], iconAnchor:[9,9]
        });
        meMarker = L.marker([lat, lng], { icon:icon, interactive:false, zIndexOffset:-100 }).addTo(map);
        map.setView([lat, lng], 12);
      } catch(e){}
    }, function(){}, { timeout:8000, enableHighAccuracy:false });
  }

  function getVisibleRanked(){
    if (!map) return [];
    var bounds = map.getBounds();
    var visible = [];
    for (var i=0;i<filtered.length;i++){
      if (bounds.contains([filtered[i].lat, filtered[i].lng])){
        visible.push(filtered[i]);
      }
    }
    return visible;
  }

  function renderMarkers(){
    if (!map) return;
    for (var i=0;i<markers.length;i++) map.removeLayer(markers[i]);
    markers = [];
    var visible = getVisibleRanked();
    var numMap = {};
    for (var v=0;v<visible.length;v++) numMap[visible[v].id] = v+1;
    for (var j=0;j<filtered.length;j++){
      (function(s){
        var isFav = favs.indexOf(s.id) >= 0;
        var num = numMap[s.id];
        var isVisible = num !== undefined;
        var inner = isVisible ? '<span>' + num + '</span>' : '<span></span>';
        var cls = 'numPin' + (isFav?' fav':'') + (isVisible?'':' dim');
        var icon = L.divIcon({
          className:'',
          html:'<div class="' + cls + '">' + inner + '</div>',
          iconSize:[30,38], iconAnchor:[15,38]
        });
        var mk = L.marker([s.lat, s.lng], { icon:icon }).addTo(map);
        mk.on('click', function(){ openDetail(s); });
        markers.push(mk);
      })(filtered[j]);
    }
  }

  function applyFilters(){
    filtered = SPOTS.filter(function(s){
      if (state.favOnly && favs.indexOf(s.id) < 0) return false;
      for (var i=0;i<state.tags.length;i++){
        if (s.tags.indexOf(state.tags[i]) < 0) return false;
      }
      return true;
    });
    filtered.sort(function(a,b){ return (b.rating||0) - (a.rating||0); });
    renderMarkers();
    renderList();
  }

  function renderList(){
    if (!map) return;
    var visible = getVisibleRanked();
    var listEl = document.getElementById('list');
    var headEl = document.getElementById('listHead');
    headEl.textContent = '表示範囲 ' + visible.length + ' / 全 ' + filtered.length + ' 件';
    if (!visible.length){
      listEl.innerHTML = '<div style="grid-column:1/-1;padding:24px;color:var(--muted);text-align:center;font-size:13px;">表示範囲に該当スポットがありません</div>';
      return;
    }
    var html = "";
    for (var v=0;v<visible.length;v++){
      var s = visible[v];
      var num = v+1;
      var img = s.images[0] ? driveImg(s.images[0], 400) : '';
      var isFav = favs.indexOf(s.id) >= 0;
      html += '<div class="card" data-id="' + s.id + '">' +
                '<div class="thumbwrap">' +
                  '<div class="thumb" style="background-image:url(' + img + ')"></div>' +
                  '<div class="numBadge">' + num + '</div>' +
                  '<button class="fav ' + (isFav?'on':'') + '" data-fav="' + s.id + '">' + (isFav?'♥':'♡') + '</button>' +
                '</div>' +
                '<div class="body">' +
                  '<div class="ttl"><div class="name">' + s.name + '</div><div class="rate">★' + (s.rating||'-') + '</div></div>' +
                  '<div class="area">' + s.area + '</div>' +
                '</div>' +
              '</div>';
    }
    listEl.innerHTML = html;
    var cards = listEl.querySelectorAll('.card');
    for (var c=0;c<cards.length;c++){
      cards[c].addEventListener('click', function(e){
        if (e.target.getAttribute && e.target.getAttribute('data-fav')) return;
        var id = parseInt(this.getAttribute('data-id'), 10);
        var sp = null;
        for (var x=0;x<SPOTS.length;x++) if (SPOTS[x].id === id) { sp = SPOTS[x]; break; }
        if (sp){ openDetail(sp); }
      });
    }
    var favBtns = listEl.querySelectorAll('[data-fav]');
    for (var f=0;f<favBtns.length;f++){
      favBtns[f].addEventListener('click', function(e){
        e.stopPropagation();
        var id = parseInt(this.getAttribute('data-fav'), 10);
        var idx = favs.indexOf(id);
        if (idx >= 0) favs.splice(idx,1); else favs.push(id);
        localStorage.setItem('favs', JSON.stringify(favs));
        applyFilters();
      });
    }
  }

  function openDetail(s){
    var imagesEl = document.getElementById('detailImages');
    var bodyEl = document.getElementById('detailBody');
    var imgs = "";
    for (var i=0;i<s.images.length;i++) imgs += '<img src="' + driveImg(s.images[i], 1200) + '" alt="">';
    imagesEl.innerHTML = imgs;
    imagesEl.className = 'detailImages' + (s.images.length === 1 ? ' single' : '');
    var tagsHtml = "";
    for (var j=0;j<s.tags.length;j++) tagsHtml += '<span class="tag" style="cursor:default">#' + s.tags[j] + '</span>';
    var isFav = favs.indexOf(s.id) >= 0;
    bodyEl.innerHTML =
      '<h2>' + s.name + '</h2>' +
      '<div class="meta">' + s.pref + ' / ' + s.area + ' ・ ★ ' + (s.rating||'-') + '</div>' +
      '<div class="desc">' + (s.description||'') + '</div>' +
      '<dl>' +
        '<dt>営業時間</dt><dd>' + (s.hours||'-') + '</dd>' +
        '<dt>料金</dt><dd>' + (s.price||'-') + '</dd>' +
      '</dl>' +
      '<div class="tags">' + tagsHtml + '</div>' +
      '<div class="actions">' +
        '<a class="btn" href="' + s.mapUrl + '" target="_blank" rel="noopener">Google Mapで開く</a>' +
        '<button class="btn ghost" id="favBtn">' + (isFav?'♥ お気に入り解除':'♡ お気に入り') + '</button>' +
      '</div>';
    document.body.classList.add('detail-mode');
    if (map){
      setTimeout(function(){
        map.invalidateSize();
        map.flyTo([s.lat, s.lng], 15, { duration:.6 });
      }, 100);
    }
    document.getElementById('favBtn').onclick = function(){
      var idx = favs.indexOf(s.id);
      if (idx >= 0) favs.splice(idx,1); else favs.push(s.id);
      localStorage.setItem('favs', JSON.stringify(favs));
      openDetail(s); applyFilters();
    };
  }
  function closeDetail(){
    document.body.classList.remove('detail-mode');
    setTimeout(function(){ if (map) map.invalidateSize(); }, 100);
  }

  function initFilters(){
    var tagSet = {};
    for (var i=0;i<SPOTS.length;i++){
      var s = SPOTS[i];
      for (var k=0;k<s.tags.length;k++) tagSet[s.tags[k]] = (tagSet[s.tags[k]]||0) + 1;
    }
    var tagEl = document.getElementById('tags');
    var tk = Object.keys(tagSet).sort(function(a,b){ return tagSet[b]-tagSet[a]; });
    for (var t=0;t<tk.length;t++){
      (function(tag){
        var el = document.createElement('span');
        el.className = 'tag'; el.textContent = '#' + tag;
        el.addEventListener('click', function(){
          var idx = state.tags.indexOf(tag);
          if (idx >= 0){ state.tags.splice(idx,1); el.classList.remove('active'); }
          else { state.tags.push(tag); el.classList.add('active'); }
          applyFilters();
        });
        tagEl.appendChild(el);
      })(tk[t]);
    }
    var favToggleEl = document.getElementById('favToggle');
    favToggleEl.addEventListener('click', function(){
      state.favOnly = !state.favOnly;
      favToggleEl.classList.toggle('on', state.favOnly);
      applyFilters();
    });
    document.getElementById('clearBtn').addEventListener('click', function(){
      state = { tags:[], favOnly:false };
      favToggleEl.classList.remove('on');
      var ts = document.querySelectorAll('#tags .tag');
      for (var i=0;i<ts.length;i++) ts[i].classList.remove('active');
      applyFilters();
    });
  }

  function initMobileUI(){
    var searchPanel = document.getElementById('searchPanel');
    var cardPanel = document.getElementById('cardPanel');
    var backdrop = document.getElementById('backdrop');
    var searchToggle = document.getElementById('searchToggle');
    var sheetHandle = document.getElementById('sheetHandle');
    var expandToggle = document.getElementById('expandToggle');
    searchToggle.addEventListener('click', function(){
      var open = searchPanel.classList.toggle('open');
      backdrop.classList.toggle('show', open);
    });
    backdrop.addEventListener('click', function(){
      searchPanel.classList.remove('open');
      backdrop.classList.remove('show');
    });
    function toggleSheet(){
      var expanded = cardPanel.classList.toggle('expanded');
      expandToggle.textContent = expanded ? '▼' : '▲';
      setTimeout(function(){ if (map) map.invalidateSize(); }, 300);
    }
    sheetHandle.addEventListener('click', toggleSheet);
    window.addEventListener('resize', function(){
      if (window.innerWidth > 768){
        searchPanel.classList.remove('open');
        cardPanel.classList.remove('expanded');
        backdrop.classList.remove('show');
        expandToggle.textContent = '▲';
      }
    });
  }

  function startApp(){
    document.getElementById('detailClose').addEventListener('click', closeDetail);
    initMap();
    initFilters();
    initMobileUI();
    applyFilters();
    initGeolocation();
  }
})();
</script>
</body>
</html>
