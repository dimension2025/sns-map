<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instagrammable Map | SNS映えスポットMAP</title>

  <link href="https://unpkg.com/maplibre-gl@5.6.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@5.6.1/dist/maplibre-gl.js"></script>

  <style>
    :root {
      --bg: #050507;
      --panel: rgba(14, 14, 18, 0.72);
      --panel-strong: rgba(12, 12, 16, 0.94);
      --line: rgba(255, 255, 255, 0.09);
      --line-strong: rgba(255, 255, 255, 0.15);
      --text: #f7f7fb;
      --muted: #a7a7b3;
      --muted-2: #8d8d98;
      --pink: #ff4da6;
      --pink-soft: rgba(255, 77, 166, 0.18);
      --gold: #d8b76a;
      --shadow: 0 16px 40px rgba(0,0,0,0.38);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans JP", sans-serif;
      overflow: hidden;
      overscroll-behavior: none;
    }

    body {
      touch-action: manipulation;
    }

    a {
      color: inherit;
    }

    button,
    input,
    select {
      font: inherit;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at top left, rgba(255,77,166,0.08), transparent 28%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.04), transparent 20%),
        var(--bg);
    }

    #map {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .map-overlay-top {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 200px;
      pointer-events: none;
      background: linear-gradient(to bottom, rgba(5,5,7,0.62), rgba(5,5,7,0.20), transparent);
      z-index: 5;
    }

    .map-overlay-bottom {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 190px;
      pointer-events: none;
      background: linear-gradient(to top, rgba(5,5,7,0.58), rgba(5,5,7,0.14), transparent);
      z-index: 5;
    }

    /* ===== Desktop Topbar ===== */
    .topbar {
      position: absolute;
      top: calc(16px + var(--safe-top));
      left: 16px;
      right: 16px;
      z-index: 20;
      display: grid;
      grid-template-columns: 170px 170px 190px 1fr 140px;
      gap: 10px;
      padding: 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    .control,
    .search,
    .button,
    .drawer-button,
    .mini-button {
      height: 46px;
      border-radius: var(--radius-md);
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      padding: 0 12px;
      outline: none;
      font-size: 14px;
      transition: border-color 0.15s ease, background 0.15s ease, transform 0.15s ease;
    }

    .control:focus,
    .search:focus,
    .button:focus,
    .drawer-button:focus,
    .mini-button:focus {
      border-color: rgba(255,255,255,0.20);
    }

    .control option {
      color: #111;
    }

    .search::placeholder {
      color: var(--muted-2);
    }

    .button,
    .drawer-button,
    .mini-button {
      cursor: pointer;
      font-weight: 700;
      background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.04));
    }

    .button:hover,
    .drawer-button:hover,
    .mini-button:hover {
      transform: translateY(-1px);
      border-color: rgba(255,255,255,0.16);
    }

    /* ===== Desktop Side Panel ===== */
    .sidepanel {
      position: absolute;
      top: calc(96px + var(--safe-top));
      right: 16px;
      bottom: calc(16px + var(--safe-bottom));
      width: 410px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    #desktopSelectedPanel {
      display: none;
      min-height: 240px;
      max-height: 47%;
    }

    #desktopSelectedPanel.active {
      display: block;
    }

    #desktopSelectedBody {
      padding: 16px;
      overflow: auto;
      max-height: calc(47vh - 16px);
    }

    #desktopListPanel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 220px;
    }

    .list-head {
      padding: 14px 16px 8px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .list-head-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.4;
    }

    .list-head-sub {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
      margin-top: 2px;
    }

    .list-body {
      padding: 10px;
      overflow: auto;
      display: grid;
      gap: 10px;
    }

    /* ===== Cards ===== */
    .card {
      display: grid;
      grid-template-columns: 124px 1fr;
      gap: 12px;
      padding: 12px;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: var(--radius-lg);
      background: rgba(255,255,255,0.04);
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.06);
    }

    .thumb {
      width: 100%;
      height: 140px;
      object-fit: cover;
      border-radius: 14px;
      background: #1b1b21;
      border: 1px solid rgba(255,255,255,0.06);
      display: block;
    }

    .hero {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 18px;
      background: #1b1b21;
      border: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 12px;
      display: block;
    }

    .name {
      margin: 0;
      font-size: 16px;
      line-height: 1.45;
      font-weight: 700;
      word-break: break-word;
    }

    .small {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .desc {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
      margin-top: 8px;
      word-break: break-word;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 9px;
    }

    .chip {
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: #d9d9e3;
      background: rgba(255,255,255,0.04);
      white-space: nowrap;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .link-button,
    .fav-button,
    .close-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      text-decoration: none;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
      background: rgba(255,255,255,0.05);
      color: var(--text);
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    .link-button:hover,
    .fav-button:hover,
    .close-button:hover {
      transform: translateY(-1px);
      border-color: rgba(255,255,255,0.16);
    }

    .link-button {
      background: #fff;
      color: #111;
    }

    .rating {
      color: var(--gold);
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .empty {
      padding: 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .muted-divider {
      width: 100%;
      height: 1px;
      background: var(--line);
      margin: 12px 0;
    }

    .selected-topline {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
    }

    .selected-actions-top {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 10px;
    }

    /* ===== Brand ===== */
    .brand-badge {
      position: absolute;
      left: 20px;
      bottom: calc(20px + var(--safe-bottom));
      z-index: 22;
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(15,15,20,0.72);
      border: 1px solid rgba(255,255,255,0.10);
      color: #f7f7fb;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.03em;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.32);
      pointer-events: none;
    }

    /* ===== Marker ===== */
    .marker {
      width: 20px;
      height: 20px;
      transform-origin: center center;
      position: relative;
      pointer-events: auto;
      cursor: pointer;
    }

    .marker-core {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #ffffff;
      border: 2px solid #0d0d10;
      box-shadow: 0 0 0 4px rgba(255,255,255,0.16);
      transition: all 0.15s ease;
      position: relative;
    }

    .marker-icon {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      color: #111;
      font-size: 11px;
      font-weight: 700;
      z-index: 2;
    }

    .marker.show-photo .marker-icon {
      display: flex;
    }

    .marker.show-photo .marker-core {
      background: #ffffff;
      border-radius: 12px;
      width: 24px;
      height: 24px;
      margin-left: -2px;
      margin-top: -2px;
    }

    .marker.active .marker-core {
      background: var(--pink);
      box-shadow: 0 0 0 8px var(--pink-soft);
    }

    .marker.active .marker-icon {
      color: #111;
    }

    .marker.active::after {
      content: "";
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid rgba(255,77,166,0.35);
      animation: pulseRing 1.8s infinite ease-out;
      pointer-events: none;
    }

    @keyframes pulseRing {
      0% {
        transform: scale(0.90);
        opacity: 0.9;
      }
      100% {
        transform: scale(1.35);
        opacity: 0;
      }
    }

    /* ===== Map controls ===== */
    .maplibregl-ctrl-group {
      background: rgba(18,18,22,0.78) !important;
      border: 1px solid rgba(255,255,255,0.08) !important;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 10px 24px rgba(0,0,0,0.30);
      overflow: hidden;
    }

    .maplibregl-ctrl button {
      background-color: transparent !important;
    }

    .maplibregl-ctrl button span {
      filter: invert(1);
    }

    .maplibregl-ctrl-bottom-left {
      left: 16px !important;
      bottom: 78px !important;
    }

    /* ===== Mobile UI ===== */
    .mobile-topbar {
      display: none;
    }

    .mobile-filter-drawer {
      display: none;
    }

    .mobile-sheet {
      display: none;
    }

    /* ===== Responsive ===== */
    @media (max-width: 1180px) {
      .topbar {
        grid-template-columns: 1fr 1fr;
      }

      .sidepanel {
        width: 360px;
      }
    }

    @media (max-width: 820px) {
      .topbar,
      .sidepanel,
      .brand-badge {
        display: none;
      }

      .mobile-topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        position: absolute;
        top: calc(12px + var(--safe-top));
        left: 12px;
        right: 12px;
        z-index: 30;
      }

      .mobile-topbar .title-chip {
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        padding: 0 14px;
        border-radius: 999px;
        background: rgba(14, 14, 18, 0.74);
        border: 1px solid rgba(255,255,255,0.09);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        box-shadow: var(--shadow);
        font-weight: 700;
        font-size: 13px;
        letter-spacing: 0.03em;
        white-space: nowrap;
      }

      .drawer-button {
        min-width: 46px;
        width: 46px;
        padding: 0;
        border-radius: 14px;
        background: rgba(14, 14, 18, 0.78);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        box-shadow: var(--shadow);
      }

      .hamburger {
        width: 18px;
        height: 14px;
        position: relative;
        display: inline-block;
      }

      .hamburger span {
        position: absolute;
        left: 0;
        right: 0;
        height: 2px;
        border-radius: 999px;
        background: #fff;
        transition: 0.2s ease;
      }

      .hamburger span:nth-child(1) { top: 0; }
      .hamburger span:nth-child(2) { top: 6px; }
      .hamburger span:nth-child(3) { top: 12px; }

      .mobile-filter-drawer {
        display: block;
        position: absolute;
        top: calc(64px + var(--safe-top));
        left: 12px;
        right: 12px;
        z-index: 29;
        padding: 12px;
        background: rgba(14, 14, 18, 0.90);
        border: 1px solid rgba(255,255,255,0.09);
        border-radius: 20px;
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        box-shadow: var(--shadow);
        transform: translateY(-10px);
        opacity: 0;
        pointer-events: none;
        transition: transform 0.18s ease, opacity 0.18s ease;
      }

      .mobile-filter-drawer.open {
        transform: translateY(0);
        opacity: 1;
        pointer-events: auto;
      }

      .mobile-filter-grid {
        display: grid;
        gap: 10px;
      }

      .mobile-filter-drawer .control,
      .mobile-filter-drawer .search,
      .mobile-filter-drawer .button {
        width: 100%;
      }

      .mobile-filter-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .mobile-sheet {
        display: flex;
        flex-direction: column;
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 31;
        background: rgba(12, 12, 16, 0.92);
        border-top-left-radius: 24px;
        border-top-right-radius: 24px;
        border: 1px solid rgba(255,255,255,0.08);
        box-shadow: 0 -8px 30px rgba(0,0,0,0.30);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        transition: height 0.22s ease, transform 0.22s ease;
        overflow: hidden;
        padding-bottom: var(--safe-bottom);
      }

      .mobile-sheet-handle {
        position: relative;
        flex: 0 0 auto;
        padding: 10px 16px 10px;
        touch-action: none;
        cursor: grab;
        user-select: none;
      }

      .mobile-sheet-grabber {
        width: 42px;
        height: 5px;
        border-radius: 999px;
        background: rgba(255,255,255,0.25);
        margin: 0 auto 10px auto;
      }

      .mobile-sheet-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }

      .mobile-sheet-title {
        font-size: 14px;
        font-weight: 700;
        line-height: 1.4;
      }

      .mobile-sheet-sub {
        font-size: 12px;
        color: var(--muted);
        line-height: 1.5;
      }

      .mobile-sheet-content {
        flex: 1 1 auto;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }

      .mobile-selected-wrap {
        display: none;
        padding: 0 12px 8px;
        overflow: auto;
      }

      .mobile-selected-wrap.active {
        display: block;
      }

      .mobile-list-wrap {
        flex: 1 1 auto;
        min-height: 0;
        padding: 0 12px 12px;
        overflow: auto;
      }

      .mobile-list-wrap .card {
        grid-template-columns: 110px 1fr;
      }

      .mobile-list-wrap .thumb {
        height: 120px;
      }

      .maplibregl-ctrl-bottom-left {
        left: 12px !important;
        bottom: calc(72px + var(--safe-bottom)) !important;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="map"></div>
    <div class="map-overlay-top"></div>
    <div class="map-overlay-bottom"></div>

    <!-- Desktop -->
    <div class="topbar">
      <select id="regionFilter" class="control">
        <option value="">地方（すべて）</option>
      </select>

      <select id="prefFilter" class="control">
        <option value="">都道府県（すべて）</option>
      </select>

      <input id="tagFilter" class="search" type="text" placeholder="#夜景 #デート #無料 など" />
      <input id="freewordFilter" class="search" type="text" placeholder="浅草 / 展望 / アート などで検索" />

      <button id="favoritesOnlyBtn" class="button">☆ お気に入り</button>
    </div>

    <div class="sidepanel">
      <div id="desktopSelectedPanel" class="panel">
        <div id="desktopSelectedBody"></div>
      </div>

      <div id="desktopListPanel" class="panel">
        <div class="list-head">
          <div>
            <div class="list-head-title" id="desktopListHeadTitle">地図範囲内のおすすめ順</div>
            <div class="list-head-sub" id="desktopListHeadSub">表示中のスポットからおすすめ度順に表示しています</div>
          </div>
          <button id="desktopFitAllBtn" class="mini-button">全体表示</button>
        </div>
        <div id="desktopListBody" class="list-body"></div>
      </div>
    </div>

    <div class="brand-badge">Instagrammable Map</div>

    <!-- Mobile -->
    <div class="mobile-topbar">
      <button id="mobileMenuBtn" class="drawer-button" aria-label="検索メニューを開く">
        <span class="hamburger" aria-hidden="true">
          <span></span><span></span><span></span>
        </span>
      </button>
      <div class="title-chip">Instagrammable Map</div>
      <button id="mobileFitAllBtn" class="drawer-button" aria-label="全体表示">⌖</button>
    </div>

    <div id="mobileFilterDrawer" class="mobile-filter-drawer">
      <div class="mobile-filter-grid">
        <select id="mobileRegionFilter" class="control">
          <option value="">地方（すべて）</option>
        </select>

        <select id="mobilePrefFilter" class="control">
          <option value="">都道府県（すべて）</option>
        </select>

        <input id="mobileTagFilter" class="search" type="text" placeholder="#夜景 #デート #無料 など" />
        <input id="mobileFreewordFilter" class="search" type="text" placeholder="浅草 / 展望 / アート などで検索" />

        <div class="mobile-filter-actions">
          <button id="mobileFavoritesOnlyBtn" class="button">☆ お気に入り</button>
          <button id="mobileCloseDrawerBtn" class="button">閉じる</button>
        </div>
      </div>
    </div>

    <div id="mobileSheet" class="mobile-sheet" aria-label="スポット一覧">
      <div id="mobileSheetHandle" class="mobile-sheet-handle">
        <div class="mobile-sheet-grabber"></div>
        <div class="mobile-sheet-head">
          <div>
            <div id="mobileSheetTitle" class="mobile-sheet-title">スポット一覧</div>
            <div id="mobileSheetSub" class="mobile-sheet-sub">上にスワイプして表示</div>
          </div>
          <button id="mobileSheetToggleBtn" class="mini-button">開く</button>
        </div>
      </div>
      <div class="mobile-sheet-content">
        <div id="mobileSelectedWrap" class="mobile-selected-wrap"></div>
        <div id="mobileListWrap" class="mobile-list-wrap"></div>
      </div>
    </div>
  </div>

  <script>
    const MOBILE_BREAKPOINT = 820;
    const PHOTO_ICON_ZOOM = 13.5;

    const STATE = {
      spots: [],
      filteredSpots: [],
      visibleSpots: [],
      selectedSpotId: null,
      favoritesOnly: false,
      favorites: new Set(JSON.parse(localStorage.getItem("spotFavorites") || "[]")),
      map: null,
      markers: new Map(),
      mobileDrawerOpen: false,
      mobileSheetState: "closed", // closed | peek | open
      mobileSheetManuallyOpened: false
    };

    const els = {
      // Desktop filters
      regionFilter: document.getElementById("regionFilter"),
      prefFilter: document.getElementById("prefFilter"),
      tagFilter: document.getElementById("tagFilter"),
      freewordFilter: document.getElementById("freewordFilter"),
      favoritesOnlyBtn: document.getElementById("favoritesOnlyBtn"),

      // Desktop panels
      desktopSelectedPanel: document.getElementById("desktopSelectedPanel"),
      desktopSelectedBody: document.getElementById("desktopSelectedBody"),
      desktopListHeadTitle: document.getElementById("desktopListHeadTitle"),
      desktopListHeadSub: document.getElementById("desktopListHeadSub"),
      desktopListBody: document.getElementById("desktopListBody"),
      desktopFitAllBtn: document.getElementById("desktopFitAllBtn"),

      // Mobile top
      mobileMenuBtn: document.getElementById("mobileMenuBtn"),
      mobileFitAllBtn: document.getElementById("mobileFitAllBtn"),
      mobileFilterDrawer: document.getElementById("mobileFilterDrawer"),
      mobileCloseDrawerBtn: document.getElementById("mobileCloseDrawerBtn"),

      // Mobile filters
      mobileRegionFilter: document.getElementById("mobileRegionFilter"),
      mobilePrefFilter: document.getElementById("mobilePrefFilter"),
      mobileTagFilter: document.getElementById("mobileTagFilter"),
      mobileFreewordFilter: document.getElementById("mobileFreewordFilter"),
      mobileFavoritesOnlyBtn: document.getElementById("mobileFavoritesOnlyBtn"),

      // Mobile sheet
      mobileSheet: document.getElementById("mobileSheet"),
      mobileSheetHandle: document.getElementById("mobileSheetHandle"),
      mobileSheetTitle: document.getElementById("mobileSheetTitle"),
      mobileSheetSub: document.getElementById("mobileSheetSub"),
      mobileSheetToggleBtn: document.getElementById("mobileSheetToggleBtn"),
      mobileSelectedWrap: document.getElementById("mobileSelectedWrap"),
      mobileListWrap: document.getElementById("mobileListWrap")
    };

    function isMobile() {
      return window.innerWidth <= MOBILE_BREAKPOINT;
    }

    function escapeHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function shorten(str, len) {
      const s = String(str || "");
      return s.length > len ? s.slice(0, len) + "…" : s;
    }

    function ratingStars(value) {
      const n = Math.max(0, Math.min(5, Number(value || 0)));
      return "★".repeat(n) + "☆".repeat(5 - n);
    }

    function saveFavorites() {
      localStorage.setItem("spotFavorites", JSON.stringify(Array.from(STATE.favorites)));
    }

    function toggleFavorite(id) {
      if (STATE.favorites.has(id)) {
        STATE.favorites.delete(id);
      } else {
        STATE.favorites.add(id);
      }
      saveFavorites();
      updateFavoriteButtons();
      renderSelected();
      updateVisibleCards();
      updateMarkerStyles();
    }

    function getDriveFileId(url) {
      if (!url) return null;
      const m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
      return m ? m[1] : null;
    }

    function toImageUrl(url) {
      if (!url) return "";
      if (url.indexOf("drive.google.com") !== -1) {
        const id = getDriveFileId(url);
        if (!id) return url;
        return "https://drive.google.com/thumbnail?id=" + id + "&sz=w1600";
      }
      return url;
    }

    function parseTags(input) {
      return String(input || "")
        .split(/\s+/)
        .map(function(v) { return v.trim(); })
        .filter(function(v) { return v.length > 0; })
        .map(function(v) {
          return v.startsWith("#") ? v : "#" + v;
        });
    }

    function normalizeText(s) {
      return String(s || "").toLowerCase();
    }

    function getSearchText(spot) {
      const parts = [
        spot.name,
        spot.description,
        spot.prefecture,
        spot.region,
        spot.hours,
        spot.fee
      ].concat(spot.hashtags || []);
      return normalizeText(parts.join(" "));
    }

    function syncFiltersToMobile() {
      els.mobileRegionFilter.value = els.regionFilter.value;
      els.mobilePrefFilter.value = els.prefFilter.value;
      els.mobileTagFilter.value = els.tagFilter.value;
      els.mobileFreewordFilter.value = els.freewordFilter.value;
      els.mobileFavoritesOnlyBtn.textContent = STATE.favoritesOnly ? "★ お気に入りのみ" : "☆ お気に入り";
    }

    function syncFiltersToDesktop() {
      els.regionFilter.value = els.mobileRegionFilter.value;
      els.prefFilter.value = els.mobilePrefFilter.value;
      els.tagFilter.value = els.mobileTagFilter.value;
      els.freewordFilter.value = els.mobileFreewordFilter.value;
      els.favoritesOnlyBtn.textContent = STATE.favoritesOnly ? "★ お気に入りのみ" : "☆ お気に入り";
    }

    function buildFilterOptions() {
      const regions = Array.from(new Set(
        STATE.spots.map(function(s) { return s.region; }).filter(Boolean)
      )).sort();

      const prefs = Array.from(new Set(
        STATE.spots.map(function(s) { return s.prefecture; }).filter(Boolean)
      )).sort();

      const regionHtml =
        '<option value="">地方（すべて）</option>' +
        regions.map(function(v) {
          return '<option value="' + escapeHtml(v) + '">' + escapeHtml(v) + '</option>';
        }).join("");

      const prefHtml =
        '<option value="">都道府県（すべて）</option>' +
        prefs.map(function(v) {
          return '<option value="' + escapeHtml(v) + '">' + escapeHtml(v) + '</option>';
        }).join("");

      els.regionFilter.innerHTML = regionHtml;
      els.mobileRegionFilter.innerHTML = regionHtml;

      els.prefFilter.innerHTML = prefHtml;
      els.mobilePrefFilter.innerHTML = prefHtml;
    }

    function currentFilters() {
      return {
        region: els.regionFilter.value,
        pref: els.prefFilter.value,
        tags: parseTags(els.tagFilter.value),
        freeword: normalizeText(els.freewordFilter.value.trim()),
        favoritesOnly: STATE.favoritesOnly
      };
    }

    function applyFilters() {
      const filters = currentFilters();

      STATE.filteredSpots = STATE.spots.filter(function(spot) {
        if (filters.region && spot.region !== filters.region) return false;
        if (filters.pref && spot.prefecture !== filters.pref) return false;
        if (filters.favoritesOnly && !STATE.favorites.has(spot.id)) return false;

        if (filters.tags.length > 0) {
          const tags = spot.hashtags || [];
          const ok = filters.tags.every(function(t) {
            return tags.indexOf(t) !== -1;
          });
          if (!ok) return false;
        }

        if (filters.freeword) {
          const text = getSearchText(spot);
          if (text.indexOf(filters.freeword) === -1) return false;
        }

        return true;
      });

      updateMarkerVisibility();
      fitToFiltered();
      updateVisibleCards();
    }

    function fitToFiltered() {
      if (!STATE.map || STATE.filteredSpots.length === 0) return;

      if (STATE.filteredSpots.length === 1) {
        const s = STATE.filteredSpots[0];
        STATE.map.easeTo({
          center: [s.lng, s.lat],
          zoom: Math.max(14, STATE.map.getZoom()),
          duration: 600
        });
        return;
      }

      const bounds = new maplibregl.LngLatBounds();
      STATE.filteredSpots.forEach(function(s) {
        bounds.extend([s.lng, s.lat]);
      });

      const rightPadding = isMobile() ? 40 : 440;
      const bottomPadding = isMobile() ? 140 : 100;

      STATE.map.fitBounds(bounds, {
        padding: {
          top: 110,
          right: rightPadding,
          bottom: bottomPadding,
          left: 50
        },
        maxZoom: 13.5,
        duration: 700
      });
    }

    function createMarker(spot) {
      const el = document.createElement("div");
      el.className = "marker";
      el.dataset.spotId = spot.id;

      const core = document.createElement("div");
      core.className = "marker-core";

      const icon = document.createElement("div");
      icon.className = "marker-icon";
      icon.textContent = "📷";

      el.appendChild(core);
      el.appendChild(icon);

      el.addEventListener("click", function(e) {
        e.stopPropagation();
        selectSpot(spot.id, true);

        if (isMobile()) {
          setMobileSheetState("peek");
          STATE.mobileSheetManuallyOpened = false;
          closeMobileDrawer();
        }
      });

      const marker = new maplibregl.Marker({
        element: el,
        anchor: "center"
      })
        .setLngLat([spot.lng, spot.lat])
        .addTo(STATE.map);

      STATE.markers.set(spot.id, marker);
    }

    function updateMarkerVisibility() {
      const visibleIds = new Set(
        STATE.filteredSpots.map(function(s) { return s.id; })
      );

      STATE.markers.forEach(function(marker, id) {
        const el = marker.getElement();
        el.style.display = visibleIds.has(id) ? "block" : "none";
      });

      updateMarkerStyles();
      updateMarkerZoomAppearance();
    }

    function updateMarkerStyles() {
      STATE.markers.forEach(function(marker, id) {
        marker.getElement().classList.toggle("active", STATE.selectedSpotId === id);
      });
    }

    function updateMarkerZoomAppearance() {
      if (!STATE.map) return;
      const zoom = STATE.map.getZoom();
      const showPhoto = zoom >= PHOTO_ICON_ZOOM;

      STATE.markers.forEach(function(marker) {
        marker.getElement().classList.toggle("show-photo", showPhoto);
      });
    }

    function getVisibleSpotsInViewport() {
      if (!STATE.map) return [];
      const bounds = STATE.map.getBounds();

      return STATE.filteredSpots
        .filter(function(s) {
          return bounds.contains([s.lng, s.lat]);
        })
        .sort(function(a, b) {
          return (b.recommendation || 0) - (a.recommendation || 0);
        });
    }

    function selectSpot(id, fly) {
      STATE.selectedSpotId = id;
      updateMarkerStyles();
      renderSelected();
      updateVisibleCards();

      const spot = STATE.spots.find(function(s) { return s.id === id; });
      if (spot && fly && STATE.map) {
        const currentZoom = STATE.map.getZoom();
        STATE.map.easeTo({
          center: [spot.lng, spot.lat],
          zoom: Math.max(14, currentZoom),
          duration: 600
        });
      }
    }

    function clearSelection() {
      STATE.selectedSpotId = null;
      updateMarkerStyles();
      renderSelected();
      updateVisibleCards();

      if (isMobile() && !STATE.mobileSheetManuallyOpened) {
        setMobileSheetState("closed");
      }
    }

    function makeSelectedHtml(spot) {
      const hero = toImageUrl((spot.images && spot.images[0]) || "");
      const isFav = STATE.favorites.has(spot.id);

      let html = "";

      html += '<div class="selected-topline">';
      html +=   '<div>';
      html +=     '<div class="small">' + escapeHtml(spot.region || "") + ' / ' + escapeHtml(spot.prefecture || "") + '</div>';
      html +=     '<h2 class="name" style="font-size:22px; margin-top:4px;">' + escapeHtml(spot.name) + '</h2>';
      html +=   '</div>';
      html += '</div>';

      if (hero) {
        html += '<img class="hero" src="' + hero + '" alt="' + escapeHtml(spot.name) + '">';
      }

      html += '<div class="small"><span class="rating">' + ratingStars(spot.recommendation) + '</span> おすすめ度 ' + (spot.recommendation || 0) + '/5</div>';

      if (spot.hours) {
        html += '<div class="small" style="margin-top:4px;">営業時間：' + escapeHtml(spot.hours) + '</div>';
      }

      if (spot.fee) {
        html += '<div class="small" style="margin-top:2px;">料金：' + escapeHtml(spot.fee) + '</div>';
      }

      if (spot.description) {
        html += '<div class="desc">' + escapeHtml(spot.description) + '</div>';
      }

      if ((spot.hashtags || []).length > 0) {
        html += '<div class="chips">';
        (spot.hashtags || []).forEach(function(tag) {
          html += '<span class="chip">' + escapeHtml(tag) + '</span>';
        });
        html += '</div>';
      }

      html += '<div class="selected-actions-top">';
      html +=   '<button class="close-button" data-action="close-selection      html += '<div class="actions">';
      html +=   '<a class="link-button" href="' + spot.googleMapsUrl + '" target="_blank" rel="noopener noreferrer">Google Mapで開く</a>';
      html +=   '<button class="fav-button" data-action="toggle-favorite" data-spot-id="' + spot.id +/div>';

      return html;
    }

    function renderSelected() {
      const spot = STATE.spots.find(function(s) {
        return s.id === STATE.selectedSpotId;
      });

      if (!spot) {
        els.desktopSelectedPanel.classList.remove("active");
        els.desktopSelectedBody.innerHTML = "";

        els.mobileSelectedWrap.classList.remove("active");
        els.mobileSelectedWrap.innerHTML = "";
        return;
      }

      const html = makeSelectedHtml(spot);

      els.desktopSelectedBody.innerHTML = html;
      els.desktopSelectedPanel.classList.add("active");

      els.mobileSelectedWrap.innerHTML = html;
      els.mobileSelectedWrap.classList.add("active");
    }

    function makeListHtml(spots) {
      let html = "";

      spots.forEach(function(spot) {
        const img = toImageUrl((spot.images && spot.images[0]) || "");
        const isFav = STATE.favorites.has(spot.id);

        html += '<div class="card" data-action="select-spot" data-spot-id="' + spot.id + 'rc="' + img + '" alt="' + escapeHtml(spot.name) + '">';
        } else {
          html += '<div class="thumb"></div>';
        }

        html += '<div>';
        html +=   '<div class="small">' + escapeHtml(spot.prefecture || "") + ' / ' + escapeHtml(spot.region || "") + '</div>';
        html +=   '<h3 class="name">' + escapeHtml(spot.name) + '</h3>';
        html +=   '<div class="small" style="margin-top:4px;"><span class="rating">' + ratingStars(spot.recommendation) + '</span> ' + (spot.recommendation || 0) + '/5 ' + (isFav ? '★' : '') + '</div>';

        if (spot.description) {
          html += '<div class="desc">' + escapeHtml(shorten(spot.description, 64)) + '</div>';
        }

        if ((spot.hashtags || []).length > 0) {
          html += '<div class="chips">';
          (spot.hashtags || []).slice(0, 4).forEach(function(tag) {
            html += '<span class="chip">' + escapeHtml(tag) + '</span>';
          });
          html += '</div>';
        }

        html += '</div>';
        html += '</div>';
      });

      return html;
    }

    function updateVisibleCards() {
      if (!STATE.map) return;

      STATE.visibleSpots = getVisibleSpotsInViewport();

      const title = STATE.selectedSpotId ? "地図範囲内のスポット" : "地図範囲内のおすすめ順";
      const sub = STATE.visibleSpots.length + "件を表示中";

      els.desktopListHeadTitle.textContent = title;
      els.desktopListHeadSub.textContent = sub;

      els.mobileSheetTitle.textContent = STATE.selectedSpotId ? "スポット詳細 / 一覧" : "スポット一覧";
      els.mobileSheetSub.textContent = STATE.selectedSpotId
        ? (STATE.visibleSpots.length + "件を表示中")
        : (STATE.mobileSheetState === "closed" ? "上にスワイプして表示" : (STATE.visibleSpots.length + "件を表示中"));

      if (STATE.visibleSpots.length === 0) {
        const emptyHtml = '<div class="empty">条件に合うスポットがありません。検索条件を変えるか、地図を移動してみてください。</div>';
        els.desktopListBody.innerHTML = emptyHtml;
        els.mobileListWrap.innerHTML = emptyHtml;
        return;
      }

      const listHtml = makeListHtml(STATE.visibleSpots);
      els.desktopListBody.innerHTML = listHtml;
      els.mobileListWrap.innerHTML = listHtml;
    }

    function updateFavoriteButtons() {
      const text = STATE.favoritesOnly ? "★ お気に入りのみ" : "☆ お気に入り";
      els.favoritesOnlyBtn.textContent = text;
      els.mobileFavoritesOnlyBtn.textContent = text;
    }

    function bindDelegatedActions(container) {
      container.addEventListener("click", function(e) {
        const actionEl = e.target.closest("[data-action]");
        if (!actionEl) return;

        const action = actionEl.dataset.action;
        const spotId = actionEl.dataset.spotId;

        if (action === "toggle-favorite" && spotId) {
          e.preventDefault();
          e.stopPropagation();
          toggleFavorite(spotId);
          return;
        }

        if (action === "close-selection") {
          e.preventDefault();
          e.stopPropagation();
          clearSelection();
          return;
        }

        if (action === "select-spot" && spotId) {
          e.preventDefault();
          selectSpot(spotId, true);
          if (isMobile()) {
            setMobileSheetState("peek");
            STATE.mobileSheetManuallyOpened = false;
          }
        }
      });
    }

    function openMobileDrawer() {
      STATE.mobileDrawerOpen = true;
      els.mobileFilterDrawer.classList.add("open");
    }

    function closeMobileDrawer() {
      STATE.mobileDrawerOpen = false;
      els.mobileFilterDrawer.classList.remove("open");
    }

    function toggleMobileDrawer() {
      if (STATE.mobileDrawerOpen) {
        closeMobileDrawer();
      } else {
        openMobileDrawer();
      }
    }

    function getMobileSheetHeights() {
      const vh = window.innerHeight;
      const safeBottom = 16;
      return {
        closed: 72 + safeBottom,
        peek: Math.round(vh * 0.42),
        open: Math.round(vh * 0.74)
      };
    }

    function setMobileSheetState(state) {
      STATE.mobileSheetState = state;
      const heights = getMobileSheetHeights();
      const height = heights[state] || heights.closed;

      els.mobileSheet.style.height = height + "px";

      if (state === "closed") {
        els.mobileSheetToggleBtn.textContent = "開く";
        if (!STATE.selectedSpotId) {
          els.mobileSelectedWrap.classList.remove("active");
        }
      } else if (state === "peek") {
        els.mobileSheetToggleBtn.textContent = "拡大";
      } else {
        els.mobileSheetToggleBtn.textContent = "閉じる";
      }

      els.mobileSheetSub.textContent = STATE.selectedSpotId
        ? (STATE.visibleSpots.length + "件を表示中")
        : (state === "closed" ? "上にスワイプして表示" : (STATE.visibleSpots.length + "件を表示中"));
    }

    function stepOpenMobileSheet() {
      if (STATE.mobileSheetState === "closed") {
        setMobileSheetState("peek");
      } else if (STATE.mobileSheetState === "peek") {
        setMobileSheetState("open");
      }
    }

    function stepCloseMobileSheet() {
      if (STATE.mobileSheetState === "open") {
        setMobileSheetState("peek");
      } else if (STATE.mobileSheetState === "peek") {
        if (STATE.selectedSpotId) {
          setMobileSheetState("closed");
        } else {
          setMobileSheetState("closed");
        }
      }
    }

    function applyDesktopFiltersFromInputs() {
      syncFiltersToMobile();
      applyFilters();
    }

    function applyMobileFiltersFromInputs() {
      syncFiltersToDesktop();
      applyFilters();
    }

    function setupMap() {
      STATE.map = new maplibregl.Map({
        container: "map",
        style: {
          version: 8,
          sources: {
            "carto-dark": {
              type: "raster",
              tiles: [
                "https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png",
                "https://b.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png",
                "https://c.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png"
              ],
              tileSize: 256,
              attribution: "&copy; OpenStreetMap contributors &copy; CARTO"
            }
          },
          layers: [
            {
              id: "carto-dark-layer",
              type: "raster",
              source: "carto-dark"
            }
          ]
        },
        center: [139.76, 35.67],
        zoom: 11.2,
        bearing: 0,
        pitch: 0,
        dragRotate: false,
        pitchWithRotate: false,
        maxPitch: 0,
        attributionControl: true
      });

      STATE.map.addControl(new maplibregl.NavigationControl({ visualizePitch: false, showCompass: false }), "bottom-left");

      STATE.map.dragRotate.disable();
      if (STATE.map.touchZoomRotate && STATE.map.touchZoomRotate.disableRotation) {
        STATE.map.touchZoomRotate.disableRotation();
      }
      if (STATE.map.touchPitch && STATE.map.touchPitch.disable) {
        STATE.map.touchPitch.disable();
      }

      STATE.map.on("load", function() {
        STATE.spots.forEach(createMarker);

        if (STATE.spots.length > 0) {
          const bounds = new maplibregl.LngLatBounds();
          STATE.spots.forEach(function(s) {
            bounds.extend([s.lng, s.lat]);
          });

          const rightPadding = isMobile() ? 40 : 460;
          const bottomPadding = isMobile() ? 120 : 100;

          STATE.map.fitBounds(bounds, {
            padding: {
              top: 110,
              right: rightPadding,
              bottom: bottomPadding,
              left: 50
            },
            maxZoom: 13.5,
            duration: 900
          });
        }

        applyFilters();
        updateMarkerZoomAppearance();
      });

      STATE.map.on("moveend", function() {
        updateVisibleCards();
      });

      STATE.map.on("zoom", function() {
        updateMarkerZoomAppearance();
      });

      STATE.map.on("click", function() {
        clearSelection();
      });
    }

    function setupEvents() {
      // Desktop filters
      els.regionFilter.addEventListener("change", applyDesktopFiltersFromInputs);
      els.prefFilter.addEventListener("change", applyDesktopFiltersFromInputs);

      let desktopTagTimer = null;
      let desktopFreewordTimer = null;

      els.tagFilter.addEventListener("input", function() {
        clearTimeout(desktopTagTimer);
        desktopTagTimer = setTimeout(applyDesktopFiltersFromInputs, 250);
      });

      els.freewordFilter.addEventListener("input", function() {
        clearTimeout(desktopFreewordTimer);
        desktopFreewordTimer = setTimeout(applyDesktopFiltersFromInputs, 250);
      });

      els.favoritesOnlyBtn.addEventListener("click", function() {
        STATE.favoritesOnly = !STATE.favoritesOnly;
        updateFavoriteButtons();
        applyDesktopFiltersFromInputs();
      });

      // Mobile filters
      els.mobileRegionFilter.addEventListener("change", applyMobileFiltersFromInputs);
      els.mobilePrefFilter.addEventListener("change", applyMobileFiltersFromInputs);

      let mobileTagTimer = null;
      let mobileFreewordTimer = null;

      els.mobileTagFilter.addEventListener("input", function() {
        clearTimeout(mobileTagTimer);
        mobileTagTimer = setTimeout(applyMobileFiltersFromInputs, 250);
      });

      els.mobileFreewordFilter.addEventListener("input", function() {
        clearTimeout(mobileFreewordTimer);
        mobileFreewordTimer = setTimeout(applyMobileFiltersFromInputs, 250);
      });

      els.mobileFavoritesOnlyBtn.addEventListener("click", function() {
        STATE.favoritesOnly = !STATE.favoritesOnly;
        updateFavoriteButtons();
        applyMobileFiltersFromInputs();
      });

      // Fit buttons
      els.desktopFitAllBtn.addEventListener("click", function() {
        clearSelection();
        fitToFiltered();
      });

      els.mobileFitAllBtn.addEventListener("click", function() {
        closeMobileDrawer();
        clearSelection();
        fitToFiltered();
      });

      // Mobile drawer
      els.mobileMenuBtn.addEventListener("click", function(e) {
        e.stopPropagation();
        toggleMobileDrawer();
      });

      els.mobileCloseDrawerBtn.addEventListener("click", function() {
        closeMobileDrawer();
      });

      // Mobile sheet toggle
      els.mobileSheetToggleBtn.addEventListener("click", function() {
        if (STATE.mobileSheetState === "closed") {
          STATE.mobileSheetManuallyOpened = true;
          setMobileSheetState("peek");
          return;
        }
        if (STATE.mobileSheetState === "peek") {
          STATE.mobileSheetManuallyOpened = true;
          setMobileSheetState("open");
          return;
        }
        STATE.mobileSheetManuallyOpened = false;
        if (STATE.selectedSpotId) {
          setMobileSheetState("peek");
        } else {
          setMobileSheetState("closed");
        }
      });

      // Outside drawer tap
      document.addEventListener("click", function(e) {
        if (!isMobile()) return;
        const drawerClicked = e.target.closest("#mobileFilterDrawer");
        const menuBtnClicked = e.target.closest("#mobileMenuBtn");
        if (!drawerClicked && !menuBtnClicked && STATE.mobileDrawerOpen) {
          closeMobileDrawer();
        }
      });

      // Swipe bottom sheet
      let touchStartY = 0;
      let touchCurrentY = 0;
      let dragging = false;

      function onTouchStart(e) {
        if (!isMobile()) return;
        dragging = true;
        touchStartY = e.touches[0].clientY;
        touchCurrentY = touchStartY;
      }

      function onTouchMove(e) {
        if (!dragging) return;
        touchCurrentY = e.touches[0].clientY;
      }

      function onTouchEnd() {
        if (!dragging) return;
        const delta = touchCurrentY - touchStartY;
        dragging = false;

        if (delta < -40) {
          STATE.mobileSheetManuallyOpened = true;
          stepOpenMobileSheet();
        } else if (delta > 40) {
          if (STATE.mobileSheetState === "open") {
            setMobileSheetState("peek");
          } else if (STATE.mobileSheetState === "peek") {
            if (STATE.selectedSpotId) {
              STATE.mobileSheetManuallyOpened = false;
              setMobileSheetState("closed");
            } else {
              STATE.mobileSheetManuallyOpened = false;
              setMobileSheetState("closed");
            }
          }
        }
      }

      els.mobileSheetHandle.addEventListener("touchstart", onTouchStart, { passive: true });
      els.mobileSheetHandle.addEventListener("touchmove", onTouchMove, { passive: true });
      els.mobileSheetHandle.addEventListener("touchend", onTouchEnd);

      // Click handle as shortcut
      els.mobileSheetHandle.addEventListener("dblclick", function() {
        if (!isMobile()) return;
        if (STATE.mobileSheetState === "closed") {
          STATE.mobileSheetManuallyOpened = true;
          setMobileSheetState("peek");
        } else if (STATE.mobileSheetState === "peek") {
          STATE.mobileSheetManuallyOpened = true;
          setMobileSheetState("open");
        } else {
          STATE.mobileSheetManuallyOpened = false;
          if (STATE.selectedSpotId) {
            setMobileSheetState("peek");
          } else {
            setMobileSheetState("closed");
          }
        }
      });

      // Resize
      window.addEventListener("resize", function() {
        syncFiltersToMobile();
        syncFiltersToDesktop();

        if (isMobile()) {
          setMobileSheetState(STATE.mobileSheetState);
        }

        if (STATE.map) {
          STATE.map.resize();
          updateMarkerZoomAppearance();
        }
      });

      // Delegated actions
      bindDelegatedActions(els.desktopSelectedBody);
      bindDelegatedActions(els.desktopListBody);
      bindDelegatedActions(els.mobileSelectedWrap);
      bindDelegatedActions(els.mobileListWrap);
    }

    function loadSpots() {
      fetch("./spots.json")
        .then(function(res) { return res.json(); })
        .then(function(data) {
          STATE.spots = data;
          buildFilterOptions();
          updateFavoriteButtons();
          syncFiltersToMobile();
          setupMap();

          if (isMobile()) {
            setMobileSheetState("closed");
          }
        })
        .catch(function(err) {
          console.error(err);
          document.getElementById("app").innerHTML =
            '<div style="padding:24px;color:white;">spots.json の読み込みに失敗しました。</div>';
        });
    }

    setupEvents();
    loadSpots();
  </script>
</body>
</html>
